<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-back:hover {
            background: #4b5563;
        }
        .btn-green {
            background: #16a34a;
        }
        .btn-green:hover {
            background: #15803d;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .msg-yellow { background: #fef3c7; color: #92400e; }
        .hidden { display: none; }
        
        /* Location Selector - Simple */
        .location-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .location-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .location-btn:hover {
            border-color: #3b82f6;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="locations.js"></script>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>

        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
        </div>

        <!-- ========================================== -->
        <!-- LOGIN / REGISTER -->
        <!-- ========================================== -->
        <div id="auth-section">
            <div id="step1">
                <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
                <button onclick="checkMobile()" id="checkBtn">Check Mobile</button>
            </div>

            <div id="step2" class="hidden">
                <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
                <button onclick="submitPin()" id="submitBtn" class="btn-green">Submit</button>
                <button onclick="resetForm()" class="btn-back">Back</button>
            </div>

            <div id="msg" class="hidden"></div>
        </div>

        <!-- ========================================== -->
        <!-- AFTER LOGIN - HOME SCREEN -->
        <!-- ========================================== -->
        <div id="home-section" class="hidden">
            <div class="location-row">
                <div class="location-btn" onclick="alert('Location selector coming soon!')">
                    📍 <span id="zone-display">Select Zone</span> ▼
                </div>
            </div>
            <div style="margin-top: 40px; text-align: center; color: #94a3b8; font-size: 14px;">
                ✅ Welcome <span id="home-mobile"></span>
            </div>
            <button onclick="logout()" class="btn-back" style="margin-top: 20px;">Logout</button>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // STATE
        // ============================================================
        let currentMobile = '';
        let actionType = '';
        let currentUser = null;

        // ============================================================
        // UI HELPERS
        // ============================================================
        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMsg() {
            document.getElementById('msg').classList.add('hidden');
        }

        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('home-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('checkBtn').textContent = 'Check Mobile';
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').className = 'btn-green';
            currentMobile = '';
            actionType = '';
            currentUser = null;
        }

        // ============================================================
        // AUTHENTICATION
        // ============================================================
        window.checkMobile = async function() {
            const mobile = document.getElementById('mobile').value.trim();

            if (!mobile || mobile.length !== 10) {
                showMsg('Enter 10-digit mobile', 'red');
                return;
            }

            currentMobile = mobile;
            showMsg('Checking...', 'blue');

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/check-mobile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });

                const data = await response.json();
                console.log('Response:', data);

                if (data.inActiveUsers) {
                    actionType = 'login';
                    showMsg('✅ User found! Enter your PIN', 'green');
                    document.getElementById('submitBtn').textContent = '🔐 Login';
                    document.getElementById('submitBtn').className = 'btn-green';
                } else if (data.inArchive) {
                    actionType = 'reactivate';
                    showMsg('📋 Archived account! Create PIN to reactivate', 'yellow');
                    document.getElementById('submitBtn').textContent = '🔄 Reactivate';
                    document.getElementById('submitBtn').className = 'btn-yellow';
                } else {
                    actionType = 'register';
                    showMsg('📱 New user! Create a PIN to register', 'blue');
                    document.getElementById('submitBtn').textContent = '📝 Register';
                    document.getElementById('submitBtn').className = 'btn-green';
                }

                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('pin').value = '';
                hideMsg();

            } catch (err) {
                showMsg('Error: ' + err.message, 'red');
            }
        };

        window.submitPin = async function() {
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMsg('Enter 4-digit PIN', 'red');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Processing...';
            showMsg('Processing...', 'blue');

            try {
                let endpoint = '';
                if (actionType === 'login') endpoint = '/login-user';
                else if (actionType === 'reactivate') endpoint = '/reactivate-user';
                else endpoint = '/register-user';

                const response = await fetch(`${EDGE_FUNCTION_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });

                const data = await response.json();
                console.log('Auth response:', data);

                if (data.success) {
                    const { data: userData } = await sb
                        .from('active_users')
                        .select('*')
                        .eq('mobile', currentMobile)
                        .single();

                    if (userData) {
                        currentUser = userData;
                        showHome(currentMobile);
                    }
                } else {
                    showMsg('❌ ' + data.error, 'red');
                }
            } catch (err) {
                showMsg('Error: ' + err.message, 'red');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = actionType === 'login' ? '🔐 Login' : '📝 Register';
            }
        };

        // ============================================================
        // HOME SCREEN
        // ============================================================
        function showHome(mobile) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('home-section').classList.remove('hidden');
            document.getElementById('home-mobile').textContent = mobile;
            showMsg('', '');
        }

        window.logout = function() {
            if (confirm('Are you sure you want to logout?')) {
                resetForm();
            }
        };

        // ============================================================
        // APP INIT
        // ============================================================
        console.log('✅ App ready');
        console.log('📱 Test users: 9876543210 (PIN: 1234)');
    </script>
</body>
</html>
