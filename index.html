<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="locations.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
        }
        input:disabled {
            opacity: 0.6;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-back:hover {
            background: #4b5563;
        }
        .btn-green {
            background: #16a34a;
        }
        .btn-green:hover {
            background: #15803d;
        }
        .btn-yellow {
            background: #d97706;
        }
        .btn-yellow:hover {
            background: #b45309;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .msg-yellow { background: #fef3c7; color: #92400e; }
        .hidden { display: none; }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            padding: 4px;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        .mobile-display {
            font-size: 20px;
            font-weight: bold;
            color: #1e293b;
            padding: 4px 0;
        }
        .action-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HOME SCREEN */
        .home-container { padding-top: 4px; }
        .home-container .logo {
            text-align: left;
            width: 100%;
            font-size: 24px;
            font-weight: 900;
            color: #2563eb;
            margin-bottom: 16px;
        }
        .home-container .logout-btn {
            width: 100%;
            padding: 10px;
            background: #e2e8f0;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            margin-top: 8px;
        }
        .home-container .logout-btn:hover {
            background: #cbd5e1;
        }

        /* ZONE FILTER - SEARCHABLE */
        .zone-filter {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }
        .zone-filter .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .zone-filter .header label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .zone-filter .header span {
            font-size: 9px;
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }
        .zone-filter .search-wrapper {
            position: relative;
        }
        .zone-filter .search-wrapper input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            color: white;
            font-weight: 600;
            outline: none;
            margin-bottom: 0;
        }
        .zone-filter .search-wrapper input::placeholder {
            color: #64748b;
        }
        .zone-filter .search-wrapper input:focus {
            border-color: #3b82f6;
        }
        .zone-filter .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            margin-top: 4px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .zone-filter .suggestions.show {
            display: block;
        }
        .zone-filter .suggestions .item {
            padding: 8px 12px;
            font-size: 12px;
            color: #e2e8f0;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .zone-filter .suggestions .item:hover {
            background: #334155;
        }
        .zone-filter .suggestions .item.selected {
            background: #1e3a5f;
            color: white;
        }
        .zone-filter .suggestions .item .highlight {
            color: #60a5fa;
        }
        .zone-filter .suggestions .no-result {
            padding: 8px 12px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }

        /* TYPE BUTTONS */
        .type-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .type-buttons button {
            padding: 6px;
            font-size: 11px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .type-buttons .active {
            background: white;
            color: #1e293b;
        }
        .type-buttons .inactive {
            background: transparent;
            color: #64748b;
        }

        /* FILTER ROWS */
        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .filter-row label {
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 2px;
        }
        .filter-row input, .filter-row select {
            width: 100%;
            padding: 6px 10px;
            font-size: 11px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-weight: 600;
            outline: none;
            margin-bottom: 0;
        }
        .filter-row input:focus, .filter-row select:focus {
            border-color: #3b82f6;
        }

        /* RESULTS */
        .results-count {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .results-count span {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* FEED */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
        }
        .feed-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .feed-card:hover {
            border-color: #3b82f6;
        }
        .feed-card .title {
            font-weight: 700;
            font-size: 14px;
            color: #0f172a;
        }
        .feed-card .meta {
            font-size: 11px;
            color: #475569;
            margin-top: 2px;
        }
        .feed-card .badge {
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
        }
        .feed-card .badge-job {
            background: #dbeafe;
            color: #1e40af;
        }
        .feed-card .badge-seeker {
            background: #dcfce7;
            color: #166534;
        }
        .no-records {
            text-align: center;
            padding: 40px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        /* AREA FILTER - SUBTLE */
        .area-filter {
            margin-top: 8px;
            display: none;
        }
        .area-filter.show {
            display: block;
        }
        .area-filter select {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            color: white;
            font-weight: 600;
            outline: none;
            margin-bottom: 0;
        }
        .area-filter select option {
            background: #1e293b;
            color: white;
        }
        .area-filter .label {
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- LOGIN SCREEN -->
        <div id="login-screen">
            <h1>JobAd</h1>
            <div class="sub">Telangana Zone Based Jobs</div>

            <div class="test-links">
                <a href="test.html">🔌 DB Test</a>
            </div>

            <!-- STEP 1: MOBILE INPUT -->
            <div id="step1">
                <label class="action-label">📱 Enter Mobile Number</label>
                <input type="tel" id="mobile" placeholder="9876543210" maxlength="10" autofocus>
                <div id="mobile-status" class="text-xs text-slate-400 mt-1"></div>
            </div>

            <!-- STEP 2: PIN INPUT -->
            <div id="step2" class="hidden fade-in">
                <div id="user-info" class="text-center mb-4">
                    <div class="mobile-display" id="display-mobile">--</div>
                    <div id="status-badge" class="text-sm font-medium"></div>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
                    <span class="toggle-password" onclick="togglePin()">👁️</span>
                </div>
                <button onclick="submitPin()" id="submitBtn" class="btn-green">Submit</button>
                <button onclick="resetForm()" class="btn-back">← Change Number</button>
            </div>

            <!-- MESSAGE -->
            <div id="msg" class="hidden"></div>
        </div>

        <!-- ========================================== -->
        <!-- HOME SCREEN - SEARCHABLE ZONE + AREA       -->
        <!-- ========================================== -->
        <div id="home-screen" class="hidden">
            <div class="home-container">
                <!-- JobAd Logo - Top Left -->
                <div class="logo">JobAd</div>
                
                <!-- FILTER BY ZONE - SEARCHABLE -->
                <div class="zone-filter">
                    <div class="header">
                        <label>📍 Filter by Zone</label>
                        <span id="zone-status">All Zones</span>
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="zone-search" placeholder="Search zone..." oninput="searchZone()" onfocus="searchZone()">
                        <div class="suggestions" id="zone-suggestions"></div>
                    </div>
                    
                    <!-- Area Filter - Shows when zone is selected -->
                    <div class="area-filter" id="area-filter">
                        <div class="label">📍 Filter by Area</div>
                        <select id="area-select" onchange="onAreaChange()">
                            <option value="">All Areas</option>
                        </select>
                    </div>
                </div>

                <!-- BOTH | JOBS ONLY | PROFILES ONLY -->
                <div class="type-buttons">
                    <button id="filter-both" class="active" onclick="setFilter('BOTH')">Both</button>
                    <button id="filter-job" class="inactive" onclick="setFilter('JOB')">Jobs Only</button>
                    <button id="filter-seeker" class="inactive" onclick="setFilter('SEEKER')">Profiles Only</button>
                </div>

                <!-- FILTER ROW 1 -->
                <div class="filter-row">
                    <div>
                        <label>Job Title</label>
                        <input type="text" id="filter-title" placeholder="Eg: Engineer" oninput="renderFeed()">
                    </div>
                    <div>
                        <label>Experience</label>
                        <select id="filter-exp" onchange="renderFeed()">
                            <option value="ALL">Any</option>
                            <option value="0-2">0-2 Years</option>
                            <option value="3-5">3-5 Years</option>
                            <option value="5+">5+ Years</option>
                        </select>
                    </div>
                </div>

                <!-- FILTER ROW 2 -->
                <div class="filter-row">
                    <div>
                        <label>Skills</label>
                        <input type="text" id="filter-skills" placeholder="Eg: python" oninput="renderFeed()">
                    </div>
                    <div>
                        <label>Area</label>
                        <select id="filter-area">
                            <option value="ALL">All areas</option>
                        </select>
                    </div>
                </div>

                <!-- RESULTS COUNT -->
                <div class="results-count">
                    <span id="results-count">Showing 0 Records</span>
                </div>

                <!-- FEED CONTAINER -->
                <div id="feed-container" class="feed-container"></div>

                <!-- LOGOUT BUTTON -->
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // STATE
        // ============================================================
        let currentMobile = '';
        let actionType = '';
        let currentUser = null;
        let isChecking = false;
        let currentFilter = 'BOTH';
        let selectedZoneId = null;
        let selectedAreaId = null;

        // ============================================================
        // FEED DATA (with zone_id and area_id)
        // ============================================================
        const feedItems = [
            { type: "JOB", title: "Senior Software Engineer", exp: 5, skills: "Java, Spring Boot", zone_id: 100, area_id: 100005, location: "Hyderabad - Hitech City", salary: "₹18-22 LPA", company: "TechMahindra", desc: "Looking for experienced Java developer", contact: "9988776655" },
            { type: "JOB", title: "Frontend Developer", exp: 3, skills: "React, Angular", zone_id: 100, area_id: 100002, location: "Hyderabad - Madhapur", salary: "₹12-15 LPA", company: "Infosys", desc: "Urgent requirement for React developer", contact: "9988776655" },
            { type: "SEEKER", title: "Full Stack Developer", exp: 4, skills: "MERN Stack, Python", zone_id: 100, area_id: 100004, location: "Hyderabad - Gachibowli", salary: "₹14 LPA", company: "Priya Sharma", desc: "Experienced full stack developer", contact: "9876543210" },
            { type: "JOB", title: "Data Scientist", exp: 4, skills: "Python, ML, SQL", zone_id: 300, area_id: 300001, location: "Warangal", salary: "₹15-20 LPA", company: "Amazon", desc: "Data scientist role", contact: "9988776655" },
            { type: "SEEKER", title: "DevOps Engineer", exp: 5, skills: "Docker, Kubernetes", zone_id: 300, area_id: 300002, location: "Hanumakonda", salary: "₹18 LPA", company: "Rahul Singh", desc: "Experienced DevOps engineer", contact: "9876543210" }
        ];

        // ============================================================
        // UI HELPERS
        // ============================================================
        function showMessage(msg, type) {
            const el = document.getElementById('msg');
            el.textContent = msg;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('msg').classList.add('hidden');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function togglePin() {
            const input = document.getElementById('pin');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('mobile-status').textContent = '';
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').className = 'btn-green';
            document.getElementById('submitBtn').disabled = false;
            currentMobile = '';
            actionType = '';
            currentUser = null;
            isChecking = false;
            document.getElementById('mobile').focus();
        }

        function setStatus(text, type) {
            const el = document.getElementById('mobile-status');
            const colors = {
                green: 'text-green-600',
                blue: 'text-blue-600',
                yellow: 'text-yellow-600',
                red: 'text-red-600',
                gray: 'text-slate-400'
            };
            el.textContent = text;
            el.className = 'text-xs mt-1 ' + (colors[type] || colors.gray);
        }

        function showPinScreen(mobile, status, statusType, btnText, btnClass) {
            currentMobile = mobile;
            document.getElementById('display-mobile').textContent = mobile;
            document.getElementById('status-badge').textContent = status;
            document.getElementById('status-badge').className = 'text-sm font-medium text-' + statusType + '-600';
            document.getElementById('submitBtn').textContent = btnText;
            document.getElementById('submitBtn').className = 'btn-' + btnClass;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('pin').value = '';
            document.getElementById('pin').focus();
            hideMessage();
        }

        // ============================================================
        // SEARCHABLE ZONE + AREA (Using locations.js)
        // ============================================================
        function searchZone() {
            const input = document.getElementById('zone-search');
            const suggestions = document.getElementById('zone-suggestions');
            const query = input.value.toLowerCase().trim();

            if (!query) {
                suggestions.classList.remove('show');
                document.getElementById('area-filter').classList.remove('show');
                return;
            }

            // Search in zones from locations.js
            const zones = window.LOCATION ? window.LOCATION.getZones() : [];
            const matches = zones.filter(zone => 
                zone.zone_name.toLowerCase().includes(query)
            );
            
            if (matches.length === 0) {
                suggestions.innerHTML = '<div class="no-result">No zones found</div>';
                suggestions.classList.add('show');
                return;
            }

            suggestions.innerHTML = matches.map(zone => `
                <div class="item" onclick="selectZone(${zone.zone_id}, '${zone.zone_name}')">
                    📍 ${zone.zone_name}
                </div>
            `).join('');
            suggestions.classList.add('show');
        }

        function selectZone(zoneId, zoneName) {
            document.getElementById('zone-search').value = zoneName;
            document.getElementById('zone-suggestions').classList.remove('show');
            selectedZoneId = zoneId;
            selectedAreaId = null;
            document.getElementById('zone-status').textContent = zoneName;

            // Populate area dropdown
            populateAreas(zoneId);
            
            // Show area filter
            document.getElementById('area-filter').classList.add('show');
            renderFeed();
        }

        function populateAreas(zoneId) {
            const areaSelect = document.getElementById('area-select');
            const areas = window.LOCATION ? window.LOCATION.getAreas(zoneId) : [];
            
            areaSelect.innerHTML = '<option value="">All Areas</option>';
            areas.forEach(area => {
                areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
            });
        }

        function onAreaChange() {
            const areaSelect = document.getElementById('area-select');
            selectedAreaId = areaSelect.value ? parseInt(areaSelect.value) : null;
            renderFeed();
        }

        // Close suggestions on outside click
        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.zone-filter .search-wrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                document.getElementById('zone-suggestions').classList.remove('show');
            }
        });

        // Enter key support
        document.getElementById('zone-search').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const firstItem = document.querySelector('#zone-suggestions .item');
                if (firstItem) {
                    firstItem.click();
                }
            }
        });

        // ============================================================
        // FEED FUNCTIONS
        // ============================================================
        function setFilter(type) {
            currentFilter = type;
            const both = document.getElementById('filter-both');
            const job = document.getElementById('filter-job');
            const seeker = document.getElementById('filter-seeker');
            both.className = type === 'BOTH' ? 'active' : 'inactive';
            job.className = type === 'JOB' ? 'active' : 'inactive';
            seeker.className = type === 'SEEKER' ? 'active' : 'inactive';
            renderFeed();
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            const count = document.getElementById('results-count');
            let filtered = [...feedItems];

            if (currentFilter === 'JOB') {
                filtered = filtered.filter(item => item.type === 'JOB');
            } else if (currentFilter === 'SEEKER') {
                filtered = filtered.filter(item => item.type === 'SEEKER');
            }

            // Filter by zone
            if (selectedZoneId) {
                filtered = filtered.filter(item => item.zone_id === selectedZoneId);
            }

            // Filter by area
            if (selectedAreaId) {
                filtered = filtered.filter(item => item.area_id === selectedAreaId);
            }

            const titleFilter = document.getElementById('filter-title').value.toLowerCase();
            if (titleFilter) {
                filtered = filtered.filter(item => item.title.toLowerCase().includes(titleFilter));
            }

            const skillsFilter = document.getElementById('filter-skills').value.toLowerCase();
            if (skillsFilter) {
                filtered = filtered.filter(item => item.skills.toLowerCase().includes(skillsFilter));
            }

            const expFilter = document.getElementById('filter-exp').value;
            if (expFilter === '0-2') {
                filtered = filtered.filter(item => item.exp <= 2);
            } else if (expFilter === '3-5') {
                filtered = filtered.filter(item => item.exp >= 3 && item.exp <= 5);
            } else if (expFilter === '5+') {
                filtered = filtered.filter(item => item.exp > 5);
            }

            count.textContent = `Showing ${filtered.length} Records`;

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-records">No records found</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                const zoneName = window.LOCATION ? window.LOCATION.getZoneName(item.zone_id) : item.zone_id;
                const areaName = window.LOCATION ? window.LOCATION.getAreaName(item.area_id) : '';
                const locationDisplay = areaName ? `${zoneName} - ${areaName}` : zoneName;
                
                return `
                <div class="feed-card" onclick="openDetail('${item.type}', '${item.title}', ${item.exp}, '${item.skills}', '${item.salary}', '${item.company}', '${item.desc}', '${locationDisplay}', '${item.contact}')">
                    <div class="title">${item.title}</div>
                    <div class="meta">${item.exp} yrs | 📍 ${locationDisplay} | ${item.salary}</div>
                    <span class="badge ${item.type === 'SEEKER' ? 'badge-seeker' : 'badge-job'}">${item.type === 'SEEKER' ? 'SEEKER' : 'JOB'}</span>
                </div>
            `}).join('');
        }

        function openDetail(type, title, exp, skills, salary, company, desc, location, contact) {
            alert(`📋 ${title}\n🏢 ${company}\n📍 ${location}\n💰 ${salary}\n📝 ${desc}`);
        }

        // ============================================================
        // AUTO-DETECT MOBILE
        // ============================================================
        document.getElementById('mobile').addEventListener('input', function(e) {
            const mobile = this.value.trim();
            const statusEl = document.getElementById('mobile-status');
            statusEl.textContent = '';
            if (mobile.length === 10) {
                autoCheckMobile(mobile);
            } else if (mobile.length > 0 && mobile.length < 10) {
                setStatus('Enter 10 digits', 'gray');
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            } else {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            }
        });

        async function autoCheckMobile(mobile) {
            if (isChecking) return;
            isChecking = true;
            const mobileInput = document.getElementById('mobile');
            mobileInput.disabled = true;
            setStatus('⏳ Checking...', 'blue');

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/check-mobile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });
                const data = await response.json();

                if (data.inActiveUsers) {
                    actionType = 'login';
                    showPinScreen(mobile, '✅ Existing user', 'green', '🔐 Login', 'green');
                    setStatus('✓ User found', 'green');
                } else if (data.inArchive) {
                    actionType = 'reactivate';
                    showPinScreen(mobile, '📋 Archived account', 'yellow', '🔄 Reactivate', 'yellow');
                    setStatus('📋 Archived', 'yellow');
                } else {
                    actionType = 'register';
                    showPinScreen(mobile, '📱 New user', 'blue', '📝 Register', 'green');
                    setStatus('✨ New user', 'blue');
                }
            } catch (err) {
                console.error('Error:', err);
                setStatus('❌ Error checking', 'red');
                showMessage('Error: ' + err.message, 'red');
            } finally {
                isChecking = false;
                mobileInput.disabled = false;
            }
        }

        // ============================================================
        // SUBMIT PIN
        // ============================================================
        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMessage('Enter 4-digit PIN', 'red');
                document.getElementById('pin').focus();
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Processing...';
            showMessage('Processing...', 'blue');

            try {
                let endpoint = '';
                if (actionType === 'login') endpoint = '/login-user';
                else if (actionType === 'reactivate') endpoint = '/reactivate-user';
                else endpoint = '/register-user';

                const response = await fetch(`${EDGE_FUNCTION_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });

                const data = await response.json();

                if (data.success) {
                    const { data: userData, error } = await sb
                        .from('active_users')
                        .select('*')
                        .eq('mobile', currentMobile)
                        .single();

                    if (error) {
                        showMessage('Error fetching user data', 'red');
                        return;
                    }

                    if (userData) {
                        currentUser = userData;
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('home-screen').classList.remove('hidden');
                        hideMessage();
                        renderFeed();
                        showToast('✅ Welcome ' + currentMobile + '!');
                    }
                } else {
                    showMessage('❌ ' + data.error, 'red');
                    document.getElementById('pin').value = '';
                    document.getElementById('pin').focus();
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'red');
            } finally {
                submitBtn.disabled = false;
                const btnText = actionType === 'login' ? '🔐 Login' : actionType === 'reactivate' ? '🔄 Reactivate' : '📝 Register';
                submitBtn.textContent = btnText;
            }
        };

        // ============================================================
        // LOGOUT
        // ============================================================
        window.logout = function() {
            if (confirm('Are you sure you want to logout?')) {
                resetForm();
                showToast('👋 Logged out');
            }
        };

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('pin').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                window.submitPin();
            }
        });

        // ============================================================
        // APP INIT
        // ============================================================
        console.log('✅ JobAd Login App Ready');
        console.log('📍 Using locations.js for zones and areas');
        console.log('📱 Test users: 9876543210 (PIN: 1234)');
        document.getElementById('mobile').focus();
    </script>
</body>
</html>
