<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-back:hover {
            background: #4b5563;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>

        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
        </div>

        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button id="checkBtn">Check Mobile</button>
        </div>

        <div id="step2" class="hidden">
            <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
            <button id="submitBtn">Submit</button>
            <button id="resetBtn" class="btn-back">Back</button>
        </div>

        <div id="msg" class="hidden"></div>
    </div>

    <script>
        (function() {
            console.log('App initializing...');

            const SB_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';

            const sb = window.supabase.createClient(SB_URL, SB_KEY);

            let curMobile = '';
            let isUser = false;

            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const msgEl = document.getElementById('msg');
            const mobileInput = document.getElementById('mobile');
            const pinInput = document.getElementById('pin');
            const checkBtn = document.getElementById('checkBtn');
            const submitBtn = document.getElementById('submitBtn');
            const resetBtn = document.getElementById('resetBtn');

            function showMsg(txt, type) {
                msgEl.textContent = txt;
                msgEl.className = 'msg msg-' + type;
                msgEl.classList.remove('hidden');
            }

            function hideMsg() {
                msgEl.classList.add('hidden');
            }

            async function checkMobile() {
                alert('Button clicked!'); // DEBUG
                console.log('checkMobile called');
                
                const mobile = mobileInput.value.trim();

                if (!mobile || mobile.length !== 10) {
                    showMsg('Enter 10-digit mobile', 'red');
                    return;
                }

                curMobile = mobile;
                showMsg('Checking...', 'blue');

                try {
                    const { data: user, error } = await sb
                        .from('active_users')
                        .select('mobile')
                        .eq('mobile', mobile)
                        .single();

                    if (user) {
                        isUser = true;
                        showMsg('✅ User found! Enter PIN', 'green');
                    } else {
                        isUser = false;
                        showMsg('📱 New user! Create PIN', 'green');
                    }

                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                    pinInput.value = '';
                    hideMsg();

                } catch (err) {
                    if (err.message && err.message.includes('No rows found')) {
                        isUser = false;
                        showMsg('📱 New user! Create PIN', 'green');
                        step1.classList.add('hidden');
                        step2.classList.remove('hidden');
                        pinInput.value = '';
                        hideMsg();
                    } else {
                        showMsg('Error: ' + err.message, 'red');
                    }
                }
            }

            async function submitPin() {
                console.log('submitPin called');
                const pin = pinInput.value.trim();

                if (!pin || pin.length !== 4) {
                    showMsg('Enter 4-digit PIN', 'red');
                    return;
                }

                showMsg('Processing...', 'blue');

                try {
                    if (isUser) {
                        const { data: user, error } = await sb
                            .from('active_users')
                            .select('pin_hash')
                            .eq('mobile', curMobile)
                            .single();

                        if (error || !user) {
                            showMsg('User not found', 'red');
                            return;
                        }

                        if (user.pin_hash === pin) {
                            showMsg('✅ Welcome ' + curMobile + '!', 'green');
                            setTimeout(resetForm, 2000);
                        } else {
                            showMsg('❌ Wrong PIN. Try 1234', 'red');
                            pinInput.value = '';
                        }
                    } else {
                        const { error } = await sb
                            .from('active_users')
                            .insert([{
                                mobile: curMobile,
                                pin_hash: pin,
                                full_name: '',
                                job_title: '',
                                created_at: new Date().toISOString(),
                                last_active: new Date().toISOString()
                            }]);

                        if (error) {
                            showMsg('Failed: ' + error.message, 'red');
                            return;
                        }

                        showMsg('✅ Registered! Welcome ' + curMobile, 'green');
                        setTimeout(resetForm, 2000);
                    }
                } catch (err) {
                    showMsg('Error: ' + err.message, 'red');
                }
            }

            function resetForm() {
                step1.classList.remove('hidden');
                step2.classList.add('hidden');
                mobileInput.value = '';
                pinInput.value = '';
                msgEl.classList.add('hidden');
                curMobile = '';
                isUser = false;
            }

            // Attach event listeners
            checkBtn.addEventListener('click', checkMobile);
            submitBtn.addEventListener('click', submitPin);
            resetBtn.addEventListener('click', resetForm);

            console.log('App ready - event listeners attached');
            console.log('checkBtn element:', checkBtn);
        })();
    </script>
</body>
</html>
