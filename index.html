<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green {
            background: #dcfce7;
            color: #166534;
        }
        .msg-red {
            background: #fee2e2;
            color: #991b1b;
        }
        .msg-blue {
            background: #dbeafe;
            color: #1e40af;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>
        
        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
            <a href="test-edge.html">🚀 Edge Test</a>
        </div>
        
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button onclick="checkMobile()">Check Mobile</button>
        </div>
        
        <div id="step2" class="hidden">
            <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
            <button onclick="submitPin()">Submit</button>
            <button onclick="resetForm()" class="btn-back">Back</button>
        </div>
        
        <div id="msg" class="hidden"></div>
    </div>

    <script>
        // Simple message function
        function showMsg(text, type) {
            var div = document.getElementById('msg');
            div.textContent = text;
            div.className = 'msg msg-' + type;
            div.classList.remove('hidden');
        }
        
        function hideMsg() {
            document.getElementById('msg').classList.add('hidden');
        }
        
        // Check mobile
        window.checkMobile = function() {
            var mobile = document.getElementById('mobile').value.trim();
            if (!mobile || mobile.length !== 10) {
                showMsg('Enter 10-digit mobile number', 'red');
                return;
            }
            
            showMsg('User found! For demo, PIN is 1234', 'green');
            
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            hideMsg();
        };
        
        // Submit PIN
        window.submitPin = function() {
            var pin = document.getElementById('pin').value.trim();
            if (!pin || pin.length !== 4) {
                showMsg('Enter 4-digit PIN', 'red');
                return;
            }
            
            if (pin === '1234') {
                showMsg('✅ Login successful! Welcome!', 'green');
                setTimeout(resetForm, 2000);
            } else {
                showMsg('❌ Wrong PIN. Try 1234', 'red');
                document.getElementById('pin').value = '';
            }
        };
        
        // Reset
        window.resetForm = function() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
        };
        
        console.log('Demo app ready - Use PIN: 1234');
    </script>
</body>
</html>
