<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="locations.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { font-size: 36px; font-weight: 800; text-align: center; color: #2563eb; margin: 0 0 8px 0; }
        .sub { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 32px; }
        .test-links { text-align: center; margin-bottom: 24px; font-size: 12px; }
        .test-links a { color: #3b82f6; text-decoration: none; margin: 0 8px; }
        .zone-selector {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            flex-wrap: wrap;
        }
        .zone-selector select {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-size: 13px;
            font-weight: 500;
        }
        .zone-selector .detected {
            font-size: 11px;
            color: #16a34a;
            background: #dcfce7;
            padding: 2px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus { border-color: #2563eb; outline: 2px solid #93c5fd; }
        input:disabled { opacity: 0.6; }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-back { background: #6b7280; margin-top: 8px; }
        .btn-back:hover { background: #4b5563; }
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }
        .btn-yellow { background: #d97706; }
        .btn-yellow:hover { background: #b45309; }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .msg-yellow { background: #fef3c7; color: #92400e; }
        .hidden { display: none; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; font-size: 14px; user-select: none; padding: 4px;
        }
        .toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            background: #1e293b; color: white;
            padding: 8px 16px; border-radius: 999px;
            font-size: 12px; font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2.5s ease forwards;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        .mobile-display { font-size: 20px; font-weight: bold; color: #1e293b; padding: 4px 0; }
        .action-label { font-size: 13px; color: #6b7280; margin-bottom: 4px; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .location-group {
            display: flex;
            gap: 8px;
        }
        .location-group select {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>

        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
        </div>

        <!-- STEP 1: MOBILE INPUT -->
        <div id="step1">
            <label class="action-label">📱 Enter Mobile Number</label>
            <input type="tel" id="mobile" placeholder="9876543210" maxlength="10" autofocus>
            <div id="mobile-status" class="text-xs text-slate-400 mt-1"></div>
        </div>

        <!-- STEP 2: PIN INPUT -->
        <div id="step2" class="hidden fade-in">
            <div id="user-info" class="text-center mb-4">
                <div class="mobile-display" id="display-mobile">--</div>
                <div id="status-badge" class="text-sm font-medium"></div>
            </div>
            <div class="password-wrapper">
                <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
                <span class="toggle-password" onclick="togglePin()">👁️</span>
            </div>
            <button onclick="submitPin()" id="submitBtn" class="btn-green">Submit</button>
            <button onclick="resetForm()" class="btn-back">← Change Number</button>
        </div>

        <!-- STEP 3: LOCATION SELECTOR -->
        <div id="step3" class="hidden fade-in">
            <div class="zone-selector">
                <span>📍</span>
                <div class="location-group" style="flex:1;">
                    <select id="zone-select" onchange="onZoneChange()">
                        <option value="">Select Zone</option>
                    </select>
                    <select id="area-select">
                        <option value="">Select Area</option>
                    </select>
                </div>
                <span class="detected" id="detected-badge">📍 Auto</span>
            </div>
            <button onclick="saveLocation()" class="btn-green">✅ Confirm Location</button>
            <button onclick="skipLocation()" class="btn-back">Skip for now</button>
        </div>

        <!-- STEP 4: DASHBOARD -->
        <div id="step4" class="hidden fade-in">
            <div class="msg msg-green" style="text-align:center;">
                ✅ Logged in as <span id="dash-mobile"></span>
            </div>
            <div id="dash-zone" class="zone-selector" style="background:#f0fdf4; border:1px solid #bbf7d0;">
                <span>📍</span>
                <span id="dash-zone-name" style="font-weight:600;">--</span>
                <span style="font-size:11px;color:#6b7280;margin-left:auto;">Preferred Location</span>
            </div>
            <button onclick="goHome()" class="btn-green" style="margin-top:12px;">🏠 Go to Home Feed</button>
            <button onclick="logout()" class="btn-back" style="margin-top:8px;">🚪 Logout</button>
        </div>

        <!-- Message -->
        <div id="msg" class="hidden"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // STATE
        // ============================================================
        let currentMobile = '';
        let actionType = '';
        let currentUser = null;
        let isChecking = false;

        // ============================================================
        // UI HELPERS
        // ============================================================
        function showMessage(msg, type) {
            const el = document.getElementById('msg');
            el.textContent = msg;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('msg').classList.add('hidden');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function togglePin() {
            const input = document.getElementById('pin');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('mobile-status').textContent = '';
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').className = 'btn-green';
            document.getElementById('submitBtn').disabled = false;
            currentMobile = '';
            actionType = '';
            currentUser = null;
            isChecking = false;
            document.getElementById('mobile').focus();
        }

        function setStatus(text, type) {
            const el = document.getElementById('mobile-status');
            const colors = {
                green: 'text-green-600',
                blue: 'text-blue-600',
                yellow: 'text-yellow-600',
                red: 'text-red-600',
                gray: 'text-slate-400'
            };
            el.textContent = text;
            el.className = 'text-xs mt-1 ' + (colors[type] || colors.gray);
        }

        function showPinScreen(mobile, status, statusType, btnText, btnClass) {
            currentMobile = mobile;
            document.getElementById('display-mobile').textContent = mobile;
            document.getElementById('status-badge').textContent = status;
            document.getElementById('status-badge').className = 'text-sm font-medium text-' + statusType + '-600';
            document.getElementById('submitBtn').textContent = btnText;
            document.getElementById('submitBtn').className = 'btn-' + btnClass;
            document.getElementById('submitBtn').disabled = false;
            
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('pin').value = '';
            document.getElementById('pin').focus();
            hideMessage();
        }

        // ============================================================
        // LOCATION HANDLERS (Using locations.js)
        // ============================================================
        function onZoneChange() {
            const zoneId = parseInt(document.getElementById('zone-select').value);
            if (zoneId) {
                window.LOCATION.populateAreaDropdown(zoneId);
            } else {
                const areaSelect = document.getElementById('area-select');
                areaSelect.innerHTML = '<option value="">Select Area</option>';
            }
        }

        async function saveLocation() {
            const zoneId = parseInt(document.getElementById('zone-select').value);
            const areaId = parseInt(document.getElementById('area-select').value) || null;
            
            if (!zoneId) {
                showMessage('Please select a zone', 'yellow');
                return;
            }
            
            const zoneName = window.LOCATION.getZoneName(zoneId);
            const areaName = window.LOCATION.getAreaName(areaId);
            const displayLocation = areaId ? `${areaName}, ${zoneName}` : zoneName;
            
            // Save to Supabase
            const saved = await window.LOCATION.saveUserLocation(currentMobile, zoneId, areaId, sb);
            
            if (saved) {
                document.getElementById('step3').classList.add('hidden');
                document.getElementById('step4').classList.remove('hidden');
                document.getElementById('dash-zone-name').textContent = displayLocation;
                document.getElementById('dash-mobile').textContent = currentUser?.mobile || currentMobile;
                showToast(`✅ Location saved: ${displayLocation}`);
            } else {
                showMessage('Failed to save location', 'red');
            }
        }

        function skipLocation() {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            document.getElementById('dash-zone-name').textContent = 'Not set';
            document.getElementById('dash-mobile').textContent = currentUser?.mobile || currentMobile;
        }

        function goHome() {
            showToast('🏠 Home feed coming soon!');
        }

        // ============================================================
        // AUTO-DETECT MOBILE
        // ============================================================
        document.getElementById('mobile').addEventListener('input', function(e) {
            const mobile = this.value.trim();
            const statusEl = document.getElementById('mobile-status');
            
            statusEl.textContent = '';
            
            if (mobile.length === 10) {
                autoCheckMobile(mobile);
            } else if (mobile.length > 0 && mobile.length < 10) {
                setStatus('Enter 10 digits', 'gray');
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            } else {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            }
        });

        async function autoCheckMobile(mobile) {
            if (isChecking) return;
            isChecking = true;
            
            const mobileInput = document.getElementById('mobile');
            mobileInput.disabled = true;
            setStatus('⏳ Checking...', 'blue');

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/check-mobile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });

                const data = await response.json();
                console.log('Auto-check response:', data);

                if (data.inActiveUsers) {
                    actionType = 'login';
                    showPinScreen(mobile, '✅ Existing user', 'green', '🔐 Login', 'green');
                    setStatus('✓ User found', 'green');
                } else if (data.inArchive) {
                    actionType = 'reactivate';
                    showPinScreen(mobile, '📋 Archived account', 'yellow', '🔄 Reactivate', 'yellow');
                    setStatus('📋 Archived', 'yellow');
                } else {
                    actionType = 'register';
                    showPinScreen(mobile, '📱 New user', 'blue', '📝 Register', 'green');
                    setStatus('✨ New user', 'blue');
                }

            } catch (err) {
                console.error('Error:', err);
                setStatus('❌ Error checking', 'red');
                showMessage('Error: ' + err.message, 'red');
            } finally {
                isChecking = false;
                mobileInput.disabled = false;
            }
        }

        // ============================================================
        // SUBMIT PIN
        // ============================================================
        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMessage('Enter 4-digit PIN', 'red');
                document.getElementById('pin').focus();
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Processing...';
            showMessage('Processing...', 'blue');

            try {
                let endpoint = '';
                if (actionType === 'login') endpoint = '/login-user';
                else if (actionType === 'reactivate') endpoint = '/reactivate-user';
                else endpoint = '/register-user';

                const response = await fetch(`${EDGE_FUNCTION_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });

                const data = await response.json();
                console.log('Auth response:', data);

                if (data.success) {
                    const { data: userData, error } = await sb
                        .from('active_users')
                        .select('*')
                        .eq('mobile', currentMobile)
                        .single();

                    if (error) {
                        showMessage('Error fetching user data', 'red');
                        return;
                    }

                    if (userData) {
                        currentUser = userData;
                        document.getElementById('step2').classList.add('hidden');
                        
                        // Show location selector
                        document.getElementById('step3').classList.remove('hidden');
                        window.LOCATION.populateZoneDropdown();
                        window.LOCATION.populateAreaDropdown();
                        await window.LOCATION.detectLocation();
                        hideMessage();
                        showToast('✅ Welcome! Select your location.');
                    }
                } else {
                    showMessage('❌ ' + data.error, 'red');
                    document.getElementById('pin').value = '';
                    document.getElementById('pin').focus();
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'red');
            } finally {
                submitBtn.disabled = false;
                const btnText = actionType === 'login' ? '🔐 Login' : actionType === 'reactivate' ? '🔄 Reactivate' : '📝 Register';
                submitBtn.textContent = btnText;
            }
        };

        // ============================================================
        // LOGOUT
        // ============================================================
        window.logout = function() {
            if (confirm('Are you sure you want to logout?')) {
                resetForm();
                showToast('👋 Logged out');
            }
        };

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('pin').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                window.submitPin();
            }
        });

        // ============================================================
        // APP INIT
        // ============================================================
        console.log('✅ JobAd App Ready');
        console.log('📍 Locations loaded from GitHub');
        console.log('📱 Test users: 9876543210 (PIN: 1234)');
        
        document.getElementById('mobile').focus();
    </script>
</body>
</html>
