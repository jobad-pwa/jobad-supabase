<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-back:hover {
            background: #4b5563;
        }
        .btn-green {
            background: #16a34a;
        }
        .btn-green:hover {
            background: #15803d;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .msg-yellow { background: #fef3c7; color: #92400e; }
        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>

        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
        </div>

        <!-- STEP 1: Mobile Input -->
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button onclick="checkMobile()" id="checkBtn">Check Mobile</button>
        </div>

        <!-- STEP 2: PIN Input -->
        <div id="step2" class="hidden">
            <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
            <button onclick="submitPin()" id="submitBtn" class="btn-green">Submit</button>
            <button onclick="resetForm()" class="btn-back">Back</button>
        </div>

        <!-- Message Display -->
        <div id="msg" class="hidden"></div>
    </div>

    <script>
        // ============================================================
        // SECTION 1: CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';

        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1';

        // ============================================================
        // SECTION 2: UI HELPERS
        // ============================================================

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMsg() {
            document.getElementById('msg').classList.add('hidden');
        }

        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('checkBtn').textContent = 'Check Mobile';
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').className = 'btn-green';
            currentMobile = '';
            isUser = false;
            actionType = '';
        }

        // ============================================================
        // SECTION 3: AUTHENTICATION
        // ============================================================

        let currentMobile = '';
        let isUser = false;
        let actionType = ''; // 'login', 'activate', 'register'

        window.checkMobile = async function() {
            console.log('checkMobile called');
            const mobile = document.getElementById('mobile').value.trim();

            if (!mobile || mobile.length !== 10) {
                showMsg('Enter 10-digit mobile', 'red');
                return;
            }

            currentMobile = mobile;
            showMsg('Checking...', 'blue');

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/sync-google-sheets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });

                const data = await response.json();
                console.log('Edge response:', data);

                if (data.exists && data.inActiveUsers) {
                    isUser = true;
                    actionType = 'login';
                    showMsg('✅ User found! Enter your PIN', 'green');
                    document.getElementById('submitBtn').textContent = '🔐 Login';
                    document.getElementById('submitBtn').className = 'btn-green';
                } else if (data.exists && !data.inActiveUsers) {
                    isUser = false;
                    actionType = 'activate';
                    showMsg('📋 Account found! Create a PIN to activate', 'yellow');
                    document.getElementById('submitBtn').textContent = '📝 Activate';
                    document.getElementById('submitBtn').className = 'btn-green';
                } else {
                    isUser = false;
                    actionType = 'register';
                    showMsg('📱 New user! Create a PIN to register', 'blue');
                    document.getElementById('submitBtn').textContent = '📝 Register';
                    document.getElementById('submitBtn').className = 'btn-green';
                }

                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('pin').value = '';
                hideMsg();

            } catch (err) {
                console.error('Error:', err);
                showMsg('Error: ' + err.message, 'red');
            }
        };

        // Function to update platform_stats with DEBUG LOGGING
        async function updatePlatformStats(mobile) {
            console.log('=== updatePlatformStats called for:', mobile);
            
            try {
                // STEP 1: Get current mobile_list
                console.log('STEP 1: Fetching current platform_stats...');
                const { data: stats, error: getError } = await sb
                    .from('platform_stats')
                    .select('mobile_list')
                    .single();

                if (getError) {
                    console.error('ERROR fetching stats:', getError);
                    return false;
                }

                console.log('Current mobile_list:', stats?.mobile_list);

                const currentList = stats?.mobile_list || [];
                
                // STEP 2: Check if mobile already exists
                if (currentList.includes(mobile)) {
                    console.log('Mobile already in platform_stats:', mobile);
                    return true;
                }

                // STEP 3: Add mobile to list
                const updatedList = [...currentList, mobile];
                console.log('Updated list will be:', updatedList);

                // STEP 4: Update the table
                console.log('STEP 4: Updating platform_stats...');
                const { data: updateData, error: updateError } = await sb
                    .from('platform_stats')
                    .update({ mobile_list: updatedList });

                if (updateError) {
                    console.error('ERROR updating platform_stats:', updateError);
                    return false;
                }

                console.log('Update successful! Response:', updateData);

                // STEP 5: Verify the update
                console.log('STEP 5: Verifying update...');
                const { data: verifyData, error: verifyError } = await sb
                    .from('platform_stats')
                    .select('mobile_list')
                    .single();

                if (verifyError) {
                    console.error('ERROR verifying update:', verifyError);
                } else {
                    console.log('Verified mobile_list:', verifyData?.mobile_list);
                }

                return true;
            } catch (err) {
                console.error('CRITICAL ERROR in updatePlatformStats:', err);
                return false;
            }
        }

        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMsg('Enter 4-digit PIN', 'red');
                return;
            }

            showMsg('Processing...', 'blue');

            try {
                if (actionType === 'login') {
                    // ==========================================
                    // LOGIN: Verify PIN via Edge Function
                    // ==========================================
                    const response = await fetch(`${EDGE_FUNCTION_URL}/login-user`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mobile: currentMobile, pin: pin })
                    });

                    const data = await response.json();
                    console.log('Login response:', data);

                    if (data.success) {
                        showMsg('✅ Welcome ' + currentMobile + '!', 'green');
                        setTimeout(resetForm, 2000);
                    } else {
                        showMsg('❌ ' + data.error, 'red');
                        document.getElementById('pin').value = '';
                    }
                } else {
                    // ==========================================
                    // REGISTER / ACTIVATE: Create new user
                    // ==========================================
                    console.log('ACTION TYPE:', actionType);
                    console.log('Registering mobile:', currentMobile);
                    
                    const response = await fetch(`${EDGE_FUNCTION_URL}/register-user`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mobile: currentMobile, pin: pin })
                    });

                    const data = await response.json();
                    console.log('Register response:', data);

                    if (data.success) {
                        // ==========================================
                        // UPDATE platform_stats with new mobile
                        // ==========================================
                        console.log('Registration successful! Updating platform_stats...');
                        const updated = await updatePlatformStats(currentMobile);
                        
                        if (updated) {
                            console.log('✅ platform_stats updated successfully');
                        } else {
                            console.warn('⚠️ platform_stats update may have failed');
                        }

                        showMsg('✅ ' + (actionType === 'activate' ? 'Activated' : 'Registered') + '! Welcome ' + currentMobile, 'green');
                        setTimeout(resetForm, 2000);
                    } else {
                        showMsg('Failed: ' + data.error, 'red');
                    }
                }
            } catch (err) {
                console.error('Error:', err);
                showMsg('Error: ' + err.message, 'red');
            }
        };

        // ============================================================
        // SECTION 4: GOOGLE SHEETS INTEGRATION (FUTURE)
        // ============================================================

        // function syncWithGoogleSheets() { ... }
        // function copyFromGoogleSheets() { ... }
        // function archiveToGoogleSheets() { ... }

        // ============================================================
        // SECTION 5: APP INIT
        // ============================================================

        console.log('App ready with DEBUG logging for platform_stats');
    </script>
</body>
</html>
