        // ============================================================

        async function incrementViewCount(targetType, targetId) {
            try {
                const table = targetType === 'JOB' ? 'active_jobs' : 'active_users';
                const idField = targetType === 'JOB' ? 'job_id' : 'mobile';
                
                const { data, error } = await sb
                    .from(table)
                    .select('views')
                    .eq(idField, targetId)
                    .maybeSingle();
                
                if (error) {
                    console.error('❌ Error fetching view count:', error);
                    return null;
                }
                
                if (!data) {
                    console.log('⚠️ Record not found for view increment:', targetId);
                    return null;
                }
                
                const currentCount = data?.views || 0;
                const newCount = currentCount + 1;
                
                const { error: updateError } = await sb
                    .from(table)
                    .update({ views: newCount })
                    .eq(idField, targetId);
                
                if (updateError) {
                    console.error('❌ Error updating view count:', updateError);
                    return null;
                }
                
                console.log(`✅ View count incremented for ${targetType} ${targetId}: ${newCount}`);
                
                if (currentDetailData && currentDetailType === targetType) {
                    const targetIdValue = targetType === 'JOB' ? currentDetailData.job_id : currentDetailData.mobile;
                    if (String(targetIdValue) === String(targetId)) {
                        currentDetailData.views = newCount;
                        const viewsEl = document.getElementById('detail-views');
                        if (viewsEl) viewsEl.textContent = newCount;
                    }
                }
                
                feedItems = feedItems.map(item => {
                    const itemId = item.type === 'JOB' ? item._raw?.job_id : item._raw?.mobile;
                    if (item.type === targetType && String(itemId) === String(targetId)) {
                        if (item._raw) {
                            item._raw.views = newCount;
                        }
                        item.views = newCount;
                    }
                    return item;
                });
                
                return newCount;
            } catch (err) {
                console.error('❌ Error incrementing view count:', err);
                return null;
            }
        }

        // ============================================================

        function formatMobileForWA(mobile) {
            return `91${mobile}`;
        }

        async function sendWhatsAppOTP(mobile) {
            setStatus('📱 Sending OTP via WhatsApp...', 'blue');
            
            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            
            sessionStorage.setItem('otp_' + mobile, otp);
            sessionStorage.setItem('otp_expiry_' + mobile, Date.now() + 300000);

            const waNumber = formatMobileForWA(mobile);
            const message = `Your JobAd verification code is: *${otp}*\n\nEnter this code to complete your registration.\n\nThis is a one-time verification.`;
            const waUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
            
            window.open(waUrl, '_blank');

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('wa-display-mobile').textContent = mobile;
            
            document.querySelectorAll('.otp-input').forEach(el => el.value = '');
            const firstInput = document.querySelector('.otp-input');
            if (firstInput) firstInput.focus();
            
            startOTPTimer();
            setStatus('📱 OTP sent via WhatsApp! Check your WhatsApp.', 'green');
            showToast('💬 OTP sent via WhatsApp!');
        }

        function getOTP() {
            return Array.from(document.querySelectorAll('.otp-input'))
                .map(el => el.value)
                .join('');
        }

        function startOTPTimer() {
            let timeLeft = otpExpiryTime;
            const timerEl = document.getElementById('otp-timer');
            const resendBtn = document.getElementById('resend-otp');
            
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            
            otpTimerInterval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                if (timerEl) timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                timeLeft--;
                
                if (timeLeft < 0) {
                    clearInterval(otpTimerInterval);
                    if (timerEl) timerEl.textContent = 'Expired';
                    if (resendBtn) resendBtn.disabled = false;
                }
            }, 1000);
        }

        async function verifyOTP() {
            const otp = getOTP();
            if (otp.length !== 6) {
                showToast('⚠️ Enter complete 6-digit OTP');
                return;
            }

            const storedOtp = sessionStorage.getItem('otp_' + currentMobile);
            const storedExpiry = sessionStorage.getItem('otp_expiry_' + currentMobile);

            if (!storedOtp) {
                showToast('❌ OTP expired. Please request again.');
                return;
            }

            if (Date.now() > parseInt(storedExpiry)) {
                showToast('❌ OTP expired. Please request again.');
                sessionStorage.removeItem('otp_' + currentMobile);
                const resendBtn = document.getElementById('resend-otp');
                if (resendBtn) resendBtn.disabled = false;
                return;
            }

            if (otp !== storedOtp) {
                showToast('❌ Invalid OTP. Please try again.');
                document.querySelectorAll('.otp-input').forEach(el => {
                    el.value = '';
                    el.classList.remove('filled');
                });
                const firstInput = document.querySelector('.otp-input');
                if (firstInput) firstInput.focus();
                return;
            }

            showToast('✅ Phone verified successfully!');
            sessionStorage.removeItem('otp_' + currentMobile);
            sessionStorage.removeItem('otp_expiry_' + currentMobile);
            
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            document.getElementById('reg-display-mobile').textContent = currentMobile;
            document.getElementById('reg-pin').value = '';
            document.getElementById('reg-pin-confirm').value = '';
            document.getElementById('reg-pin').focus();
            setStatus('📱 Set your PIN', 'blue');
        }

            const mobile = currentMobile;

            const waNumber = formatMobileForWA(mobile);

            document.getElementById('resend-otp').disabled = true;
            startOTPTimer();
            showToast('🔄 OTP resent via WhatsApp!');
        }

        // ============================================================
        // REGISTER USER - Adds to all_users
        // ============================================================
        async function registerUser() {
            const pin = document.getElementById('reg-pin').value.trim();
            const confirmPin = document.getElementById('reg-pin-confirm').value.trim();

            if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
                showToast('⚠️ Enter a valid 4-digit PIN');
                document.getElementById('reg-pin').focus();
                return;
            }

            if (pin !== confirmPin) {
                showToast('⚠️ PINs do not match');
                document.getElementById('reg-pin-confirm').value = '';
                document.getElementById('reg-pin-confirm').focus();
                return;
            }

            document.getElementById('register-btn').disabled = true;
            document.getElementById('register-btn').textContent = '⏳ Creating...';

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/register-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });
                const data = await response.json();
                
                if (data.success) {
                    const { data: platformData, error: fetchError } = await sb
                        .from('platform_stats')
                        .select('all_users')
                        .maybeSingle();
                    
                    if (fetchError && fetchError.code !== 'PGRST116') {
                        console.error('Error fetching platform_stats:', fetchError);
                    }
                    
                    let allUsers = platformData?.all_users || [];
                    const mobileBigInt = BigInt(currentMobile);
                    
                    const exists = allUsers.some(m => {
                        try {
                            return BigInt(m) === mobileBigInt;
                        } catch (e) {
                            return String(m) === currentMobile;
                        }
                    });
                    
                    if (!exists) {
                        allUsers.push(Number(currentMobile));
                        
                        if (platformData) {
                            const { error: updateError } = await sb
                                .from('platform_stats')
                                .update({ all_users: allUsers })
                                .eq('id', platformData.id);
                            
                            if (updateError) {
                                console.error('Error updating platform_stats:', updateError);
                            }
                        } else {
                            const { error: insertError } = await sb
                                .from('platform_stats')
                                .insert([{ all_users: allUsers }]);
                            
                            if (insertError) {
                                console.error('Error inserting platform_stats:', insertError);
                            }
                        }
                    }
                    
                    showToast('✅ Registration successful!');
                    await fetchUserData(currentMobile);
                } else {
                    showToast('❌ Registration failed: ' + data.error);
                    document.getElementById('register-btn').disabled = false;
                    document.getElementById('register-btn').textContent = '✅ Create Account';
                }
            } catch (err) {
                showToast('❌ Error: ' + err.message);
                document.getElementById('register-btn').disabled = false;
                document.getElementById('register-btn').textContent = '✅ Create Account';
            }
        }

        // ============================================================

        window.submitPin = async function() {
            const pin = document.getElementById('pin').value.trim();
            if (!pin || pin.length !== 4) {
                showToast('⚠️ Enter 4-digit PIN');
                document.getElementById('pin').focus();
                return;
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '⏳ Verifying...';

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/login-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });
                const data = await response.json();
                
                if (data.success) {
                    isGuest = false;
                    sessionStorage.removeItem('guest_session');
                    await fetchUserData(currentMobile);
                    showToast('✅ Welcome back!');
                } else {
                    showToast('❌ Invalid PIN. Please try again.');
                    document.getElementById('pin').value = '';
                    document.getElementById('pin').focus();
                }
            } catch (err) {
                showToast('❌ Error: ' + err.message);
            } finally {
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '🔐 Login';
            }
        };

        // ============================================================
        // FETCH USER DATA
        // ============================================================
        async function fetchUserData(mobile) {
            const { data, error } = await sb
                .from('active_users')
                .select('*')
                .eq('mobile', mobile)
                .single();

            if (error) {
                const { data: newUser, error: insertError } = await sb
                    .from('active_users')
                    .insert([{ mobile: mobile, last_active: new Date().toISOString() }])

        async function autoLoginGuest() {
            try {
                const { data: platformData, error: platformError } = await sb
                    .from('platform_stats')
                    .select('all_users')
                    .maybeSingle();

                let allUsers = platformData?.all_users || [];
                const guestBigInt = BigInt(GUEST_MOBILE);
                const guestExists = allUsers.some(m => {
                    try {
                        return BigInt(m) === guestBigInt;
                    } catch (e) {
                        return String(m) === GUEST_MOBILE;
                    }
                });
                
                if (!guestExists) {
                    allUsers.push(Number(GUEST_MOBILE));
                    
                    if (platformData) {
                        const { error: updateError } = await sb
                            .from('platform_stats')
                            .update({ all_users: allUsers })
                            .eq('id', platformData.id);
                        
                        if (updateError) {
                            console.error('Error updating platform_stats for guest:', updateError);
                        }
                    } else {
                        const { error: insertError } = await sb
                            .from('platform_stats')
                            .insert([{ all_users: allUsers }]);
                        
                        if (insertError) {
                            console.error('Error inserting platform_stats for guest:', insertError);
                        }
                    }
                }

                const { data: activeUser, error: activeError } = await sb
                    .from('active_users')
                    .select('*')
                    .eq('mobile', GUEST_MOBILE)
                    .maybeSingle();

                if (!activeUser) {
                    const { error: insertActiveError } = await sb
                        .from('active_users')
                        .insert([{ 
                            mobile: GUEST_MOBILE,
                            is_guest: true,
                            last_active: new Date().toISOString()
                        }]);
                    if (insertActiveError) {
                        console.error('Error creating guest active:', insertActiveError);
                    }
                }

                const response = await fetch(`${EDGE_FUNCTION_URL}/login-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: GUEST_MOBILE, pin: GUEST_PIN })
                });
                const data = await response.json();
                
                if (data.success) {
                    isGuest = true;
                    await fetchGuestUserData(GUEST_MOBILE);
                    showToast('👤 Welcome, Guest!');
                    processSharedLinkAfterLogin();
                } else {
                    const { data: userData, error: userError } = await sb
                        .from('active_users')
                        .select('*')
                        .eq('mobile', GUEST_MOBILE)
                        .single();
                    
                    if (!userError && userData) {
                        isGuest = true;
                        currentUser = userData;
                        showHomeScreenAfterLogin();
                        showToast('👤 Welcome, Guest!');
                        processSharedLinkAfterLogin();
                    } else {
                        showToast('⚠️ Guest login failed. Please try again.');
                    }
                }
            } catch (err) {
                console.error('Guest login error:', err);
                showToast('⚠️ Guest login failed: ' + err.message);
            }
        }

            const type = urlParams.get('type');

            if (type && id) {

        async function processSharedLinkAfterLogin() {

            sharedLinkProcessed = true;
            
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('show');
            
            try {

        async function verifyResetOTP() {
            const otp = getOTP();
            if (otp.length !== 6) {
                showToast('⚠️ Enter complete 6-digit OTP');
                return;
            }

            const mobile = currentMobile;
            const storedOtp = sessionStorage.getItem('reset_otp_' + mobile);
            const storedExpiry = sessionStorage.getItem('reset_otp_expiry_' + mobile);

            if (!storedOtp || Date.now() > parseInt(storedExpiry)) {
                showToast('❌ OTP expired. Please try again.');
                return;
            }

            if (otp !== storedOtp) {
                showToast('❌ Invalid OTP. Please try again.');
                document.querySelectorAll('.otp-input').forEach(el => {
                    el.value = '';
                    el.classList.remove('filled');
                });
                const firstInput = document.querySelector('.otp-input');
                if (firstInput) firstInput.focus();
                return;
            }

            showToast('✅ OTP verified! Set your new PIN.');
            sessionStorage.removeItem('reset_otp_' + mobile);
            sessionStorage.removeItem('reset_otp_expiry_' + mobile);

            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            document.getElementById('reg-display-mobile').textContent = mobile;
            document.getElementById('register-btn').textContent = '💾 Reset PIN';
            document.getElementById('register-btn').className = 'btn-primary btn-yellow';
            document.getElementById('register-btn').onclick = function() {
                saveResetPIN();
            };
            document.getElementById('reg-pin').value = '';
            document.getElementById('reg-pin-confirm').value = '';
            document.getElementById('reg-pin').focus();
        }

        async function saveResetPIN() {
            const pin = document.getElementById('reg-pin').value.trim();
            const confirmPin = document.getElementById('reg-pin-confirm').value.trim();

            if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
                showToast('⚠️ Enter a valid 4-digit PIN');
                document.getElementById('reg-pin').focus();
                return;
            }

            if (pin !== confirmPin) {
                showToast('⚠️ PINs do not match');
                document.getElementById('reg-pin-confirm').value = '';
                document.getElementById('reg-pin-confirm').focus();
                return;
            }

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/change-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, new_pin: pin })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('✅ PIN reset successfully! Please login with your new PIN.');
                    resetForm();

                    document.getElementById('mobile').focus();

                    showToast('❌ Failed to reset PIN: ' + data.error);
                }
            } catch (err) {
                showToast('❌ Error: ' + err.message);
            }
        }

        // ============================================================
        // POST JOB FUNCTIONS
        // ============================================================
        function setupCounter(inputId, counterId, maxLen) {
            const input = document.getElementById(inputId);
            const counter = document.getElementById(counterId);
            if (!input || !counter) return;
            const update = () => {
                const len = input.value.length;
                counter.textContent = `${len}/${maxLen}`;
                if (len > maxLen) {
                    input.value = input.value.slice(0, maxLen);
                    counter.textContent = `${maxLen}/${maxLen}`;
                }
            };

        function updatePostAreas() {
            const zoneSelect = document.getElementById('pj-zone');
            const areaSelect = document.getElementById('pj-area');
            const areaHint = document.getElementById('pj-area-hint');
            if (!zoneSelect || !areaSelect) return;
            const zoneId = parseInt(zoneSelect.value);
            areaSelect.innerHTML = '<option value="">Select zone first</option>';
            if (!zoneId) {
                if (areaHint) areaHint.textContent = '⬆️ Choose zone first';
                return;
            }
            const areas = getAreasByZone(zoneId);
            if (areas.length === 0) {
                areaSelect.innerHTML = '<option value="">No areas</option>';
                if (areaHint) areaHint.textContent = '⚠️ No areas for this zone';
                return;
            }
            areas.forEach(area => {
                areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
            });
            if (areaHint) areaHint.textContent = `✅ ${areas.length} areas available`;
            if (areas.length > 0) areaSelect.value = areas[0].area_id;
        }

        async function publishJob() {
            if (!currentUser || isGuest) {
                showToast('🔐 Please login to post jobs');
                showLogin();
                return;
            }

            if (!currentUser.company_name || currentUser.company_name.trim() === '') {
                showToast('⚠️ Please set your company name in profile first');
                goToProfile();
                return;
            }

            const isEditing = document.getElementById('pj-publish-btn').dataset.editing === 'true';
            const editJobId = document.getElementById('pj-publish-btn').dataset.jobid;

            const company = document.getElementById('pj-company').value.trim();
            const jobTitle = document.getElementById('pj-title').value.trim();
            const expRaw = document.getElementById('pj-experience').value.trim();
            const salaryRaw = document.getElementById('pj-salary').value.replace(/,/g, '');
            const gender = parseInt(document.getElementById('pj-gender').value);
            const zone = document.getElementById('pj-zone').value;
            const area = document.getElementById('pj-area').value;
            const skills = document.getElementById('pj-skills').value.trim();
            const description = document.getElementById('pj-description').value.trim();
            const expiryDate = document.getElementById('pj-expiry').value;

            if (!company) { showToast('⚠️ Company name is required'); return; }
            if (!jobTitle) { showToast('⚠️ Job Title is required'); return; }
            if (jobTitle.length > 60) { showToast('⚠️ Job Title max 60 characters'); return; }
            if (!expRaw || isNaN(parseFloat(expRaw)) || parseFloat(expRaw) < 0) { showToast('⚠️ Enter valid min experience'); return; }
            if (!salaryRaw || isNaN(parseInt(salaryRaw)) || parseInt(salaryRaw) <= 0) { showToast('⚠️ Enter valid salary'); return; }
            if (!zone) { showToast('⚠️ Please select Job Location Zone'); return; }
            if (!area) { showToast('⚠️ Please select Specific Area'); return; }
            if (!skills) { showToast('⚠️ Skills are required'); return; }
            if (skills.length > 200) { showToast('⚠️ Skills max 200 characters'); return; }
            if (description.length > 500) { showToast('⚠️ Description max 500 characters'); return; }
            if (!expiryDate) { showToast('⚠️ Please select expiry date'); return; }

            const selectedDate = new Date(expiryDate);
            const maxDate = new Date(Date.now() + 45*24*60*60*1000);
            if (selectedDate > maxDate) {
                showToast('⚠️ Expiry date cannot exceed 45 days from today');
                return;
            }

            const jobData = {
                mobile: currentUser.mobile,
                job_title: jobTitle,
                company_name: company,
                min_experience_years: parseFloat(expRaw),
                max_salary_monthly: parseInt(salaryRaw),
                preferred_gender: gender,
                skills_comma_separated: skills,
                job_description: description || '',
                zone_id: parseInt(zone),
                area_id: parseInt(area),
                expiry_date: new Date(expiryDate).toISOString(),
                share_count: 0,
                views: 0,
                calls: 0,
                whatsapp: 0
            };

            try {
                if (isEditing && editJobId) {
                    const { error } = await sb
                        .from('active_jobs')
                        .update(jobData)
                        .eq('job_id', parseInt(editJobId));
                    if (error) throw error;
                    showToast('✅ Job updated successfully!');
                } else {
                    jobData.posted_date = new Date().toISOString();
                    const { error } = await sb.from('active_jobs').insert([jobData]);
                    if (error) throw error;
                    showToast('✅ Job published successfully!');
                }

                document.getElementById('pj-publish-btn').dataset.editing = 'false';
                document.getElementById('pj-publish-btn').dataset.jobid = '';
                document.getElementById('pj-publish-btn').textContent = '📤 Publish Job';
                document.getElementById('pj-title').value = '';
                document.getElementById('pj-skills').value = '';
                document.getElementById('pj-description').value = '';
                document.getElementById('pj-salary').value = '';
                document.getElementById('pj-experience').value = '3.5';
                document.getElementById('pj-company').value = currentUser.company_name || '';
                document.querySelectorAll('#postjob-page input, #postjob-page textarea').forEach(el => {
                    if (el) el.dispatchEvent(new Event('input'));
                });
                const d = new Date();
                d.setDate(d.getDate() + 30);
                document.getElementById('pj-expiry').value = d.toISOString().split('T')[0];
                document.getElementById('pj-gender').value = '0';
                document.getElementById('pj-zone').value = '100';
                updatePostAreas();

                fetchFeedData();
                goToProfile();
                loadMyJobs();
            } catch (err) {
                showToast('❌ Failed: ' + err.message);
            }
        }

        async function toggleEndorsement(targetType, targetId, mobile) {
            if (isGuest) {
                showToast('🔐 Please login to recommend');
                showLogin();
                return null;
            }
            if (!currentUser) {
                showToast('⚠️ Please login first');
                showLogin();
                return null;
            }

            const table = targetType === 'JOB' ? 'active_jobs' : 'active_users';
            const idField = targetType === 'JOB' ? 'job_id' : 'mobile';
            const targetMobile = currentUser.mobile;

            try {
                const { data, error } = await sb
                    .from(table)
                    .select('endorsements, flags')
                    .eq(idField, targetId)
                    .single();

                if (error) throw error;

                let endorsements = data.endorsements || [];
                let flags = data.flags || [];

                const alreadyEndorsed = endorsements.includes(parseInt(targetMobile));
                const alreadyFlagged = flags.includes(parseInt(targetMobile));

                if (alreadyEndorsed) {
                    endorsements = endorsements.filter(m => m !== parseInt(targetMobile));
                    showToast('👍 Endorsement removed');
                } else {
                    if (alreadyFlagged) {
                        flags = flags.filter(m => m !== parseInt(targetMobile));
                        showToast('👎 Flag removed, adding endorsement');
                    }
                    endorsements.push(parseInt(targetMobile));
                    showToast('👍 Endorsed successfully!');
                }

                const { error: updateError } = await sb
                    .from(table)
                    .update({ endorsements: endorsements, flags: flags })
                    .eq(idField, targetId);

                if (updateError) throw updateError;

                await fetchFeedData();
                return { endorsements, flags };

            } catch (err) {
                console.error('Error toggling endorsement:', err);
                showToast('❌ Failed to update: ' + err.message);
                return null;
            }
        }

        async function saveEditSeeker() {
            if (isGuest) {
                showToast('🔐 Please login to save profile');
                showLogin();
                return;
            }
            const name = document.getElementById('edit-seeker-name').value.trim();
            const title = document.getElementById('edit-seeker-title').value.trim();
            const exp = document.getElementById('edit-seeker-exp').value.trim();
            const salaryRaw = document.getElementById('edit-seeker-salary').value;
            const salary = parseSalaryValue(salaryRaw);
            const skills = document.getElementById('edit-seeker-skills').value.trim();
            const about = document.getElementById('edit-seeker-about').value.trim();
            const zoneId = parseInt(document.getElementById('edit-seeker-zone').value);
            const areaId = parseInt(document.getElementById('edit-seeker-area').value);
            const gender = parseInt(document.getElementById('edit-seeker-gender').value);
            const notice = parseInt(document.getElementById('edit-seeker-notice').value) || 0;
            if (!name) { showToast('⚠️ Please enter your full name'); return; }
            if (name.length > 50) { showToast('⚠️ Name must be less than 50 characters'); return; }
            if (title.length > 50) { showToast('⚠️ Job title must be less than 50 characters'); return; }
            if (exp && (parseFloat(exp) > 99 || parseFloat(exp) < 0)) { showToast('⚠️ Experience must be between 0-99 years'); return; }
            if (salary && parseInt(salary) > 9999999) { showToast('⚠️ Salary cannot exceed ₹99,99,999'); return; }
            if (notice > 365 || notice < 0) { showToast('⚠️ Notice period must be between 0-365 days'); return; }
            if (skills.length > 100) { showToast('⚠️ Skills must be less than 100 characters'); return; }
            if (about.length > 200) { showToast('⚠️ About Me must be less than 200 characters'); return; }
            if (!zoneId) { showToast('⚠️ Please select your zone'); return; }
            const updates = {
                full_name: name,
                job_title: title || '',
                total_experience_years: parseFloat(exp) || 0,
                expected_salary_monthly: parseInt(salary) || 0,
                skills_comma_separated: skills || '',
                professional_summary: about || '',
                zone_id: zoneId,
                area_id: areaId || null,
                gender: gender || 0,
                notice_period_days: notice,
                last_active: new Date().toISOString()
            };
            try {
                const { error } = await sb.from('active_users').update(updates).eq('mobile', currentUser.mobile);
                if (error) throw error;
                currentUser = { ...currentUser, ...updates };
                showToast('✅ Job profile saved!');
                goToProfile();
            } catch (err) {
                showToast('❌ Failed to save: ' + err.message);
            }
        }

        async function autoCleanExpiredJobs() {
            try {
                const now = new Date().toISOString();
                const { error } = await sb
                    .from('active_jobs')
                    .delete()
                    .lt('expiry_date', now);
                if (error) console.error('Error cleaning expired jobs:', error);
            } catch (err) {
                console.error('Auto-clean error:', err);
            }
        }

        async function fetchFeedData() {
            console.log('🔄 Fetching feed data from Supabase...');
            try {
                await autoCleanExpiredJobs();
                const { data: jobs, error: jobsError } = await sb.from('active_jobs').select('*').limit(50);
                if (jobsError) throw jobsError;
                const { data: seekers, error: seekersError } = await sb.from('active_users').select('*').not('full_name', 'is', null).limit(50);
                if (seekersError) throw seekersError;
                const formattedJobs = (jobs || []).map(job => ({
                    type: 'JOB',
                    title: job.job_title || 'Untitled Job',
                    company: job.company_name || 'Unknown',
                    exp: parseInt(job.min_experience_years) || 0,
                    skills: job.skills_comma_separated || '',
                    zone_id: job.zone_id || 0,
                    area_id: job.area_id || 0,
                    salary: job.max_salary_monthly ? `₹${Number(job.max_salary_monthly).toLocaleString('en-IN')}` : 'Negotiable',
                    desc: job.job_description || '',
                    contact: job.mobile || 'N/A',
                    share_count: job.share_count || 0,
                    views: job.views || 0,
                    _raw: job
                }));
                const formattedSeekers = (seekers || []).map(user => ({
                    type: 'SEEKER',
                    title: user.job_title || 'Job Seeker',
                    name: user.full_name || 'Job Seeker',
                    exp: parseFloat(user.total_experience_years) || 0,
                    skills: user.skills_comma_separated || '',
                    zone_id: user.zone_id || 0,
                    area_id: user.area_id || 0,
                    salary: user.expected_salary_monthly ? `₹${Number(user.expected_salary_monthly).toLocaleString('en-IN')}` : 'Not specified',
                    desc: user.professional_summary || '',
                    contact: user.mobile || 'N/A',
                    share_count: user.share_count || 0,
                    views: user.views || 0,
                    _raw: user
                }));
                feedItems = [...formattedJobs, ...formattedSeekers];
                console.log(`✅ Loaded ${feedItems.length} items from Supabase`);
            } catch (err) {
                console.error('❌ Error fetching from Supabase:', err.message);
                feedItems = [];
            }
            renderFeed();
        }

        function setFilter(type) {
            currentFilter = type;
            const both = document.getElementById('filter-both');
            const job = document.getElementById('filter-job');
            const seeker = document.getElementById('filter-seeker');
            if (both) both.className = type === 'BOTH' ? 'active' : 'inactive';
            if (job) job.className = type === 'JOB' ? 'active' : 'inactive';
            if (seeker) seeker.className = type === 'SEEKER' ? 'active' : 'inactive';
            renderFeed();
        }

        function renderFeed() {
            if (currentPage !== 'home') return;
            const container = document.getElementById('feed-container');
            const count = document.getElementById('results-count');
            if (!feedItems || feedItems.length === 0) {
                if (container) container.innerHTML = '<div class="no-records">No data available in Supabase</div>';
                if (count) count.textContent = 'Showing 0 Records';
                return;
            }
            let filtered = [...feedItems];
            if (currentFilter === 'JOB') {
                filtered = filtered.filter(item => item.type === 'JOB');
            } else if (currentFilter === 'SEEKER') {
                filtered = filtered.filter(item => item.type === 'SEEKER');
            }
            if (selectedZoneId) {
                filtered = filtered.filter(item => item.zone_id === selectedZoneId);
            }
            if (selectedAreaId) {
                filtered = filtered.filter(item => item.area_id === selectedAreaId);
            }
            const titleFilter = document.getElementById('filter-title');
            if (titleFilter && titleFilter.value) {
                const searchTerm = titleFilter.value.toLowerCase();
                filtered = filtered.filter(item => {
                    const searchText = item.type === 'JOB' ? item.title : item.name;
                    return searchText.toLowerCase().includes(searchTerm);
                });
            }
            const skillsFilter = document.getElementById('filter-skills');
            if (skillsFilter && skillsFilter.value) {
                const searchTerm = skillsFilter.value.toLowerCase();
                filtered = filtered.filter(item => item.skills.toLowerCase().includes(searchTerm));
            }
            const expFilter = document.getElementById('filter-exp');
            if (expFilter) {
                const value = expFilter.value;
                if (value === '0-2') {
                    filtered = filtered.filter(item => item.exp <= 2);
                } else if (value === '3-5') {
                    filtered = filtered.filter(item => item.exp >= 3 && item.exp <= 5);
                } else if (value === '5+') {
                    filtered = filtered.filter(item => item.exp > 5);
                }
            }
            if (count) count.textContent = `Showing ${filtered.length} Records`;
            if (filtered.length === 0) {
                if (container) container.innerHTML = '<div class="no-records">No records found matching your filters</div>';
                return;
            }
            if (container) {
                container.innerHTML = filtered.map(item => {
                    const zoneName = getZoneName(item.zone_id);
                    const areaName = getAreaName(item.area_id);
                    const locationDisplay = areaName ? `${zoneName} - ${areaName}` : zoneName;
                    const typeClass = item.type === 'SEEKER' ? 'badge-seeker' : 'badge-job';
                    const typeLabel = item.type === 'SEEKER' ? 'SEEKER' : 'JOB';
                    const endorsements = item._raw?.endorsements || [];
                    const flags = item._raw?.flags || [];
                    const shareCount = item.share_count || 0;
                    const totalPopularity = endorsements.length + shareCount;
                    const flagsCount = flags.length;
                    const targetId = item.type === 'JOB' ? item._raw?.job_id : item._raw?.mobile;
                    
                    let titleDisplay, subDisplay, titleClass;
                    if (item.type === 'JOB') {
                        titleDisplay = item.title;
                        subDisplay = item.company;
                        titleClass = 'job-title';
                    } else {
                        titleDisplay = item.name;
                        subDisplay = item.title;
                        titleClass = 'seeker-name';
                    }
                    
                    return `
                    <div class="feed-card" onclick="openDetailFromFeed(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        <div class="title ${titleClass}">${titleDisplay}</div>
                        <div class="meta"><span class="highlight">${subDisplay}</span> · ${item.exp} yrs · 📍 ${locationDisplay} · ${item.salary}</div>
                        <div class="bottom-row">
                            <span class="badge ${typeClass}">${typeLabel}</span>
                            <div class="action-row">
                                <span class="action-item" onclick="event.stopPropagation(); feedShowEndorsers('${item.type}', '${targetId}')">👍 <span class="count">${totalPopularity}</span></span>
                                <span class="action-divider">|</span>
                                <span class="action-item" onclick="event.stopPropagation(); feedShowFlaggers('${item.type}', '${targetId}')">👎 <span class="count">${flagsCount}</span></span>
                                <span class="action-divider">|</span>
                                <button class="share-btn" onclick="shareFromFeed(event, '${item.type}', '${targetId}')" title="Share">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }
        }

        function getShareUrl() {
            let url = window.location.origin + window.location.pathname;
            
            if (currentDetailData && currentDetailType) {
                const targetId = currentDetailType === 'JOB' ? currentDetailData.job_id : currentDetailData.mobile;
                url += `?type=${currentDetailType}&id=${targetId}`;
            }
            
            return url;
        }

        function getShareTitle() {
            if (currentDetailData) {
                if (currentDetailType === 'JOB') {
                    return `${currentDetailData.job_title || 'Job'} at ${currentDetailData.company_name || 'Company'}`;
                } else {
                    return `${currentDetailData.full_name || 'Job Seeker'} - ${currentDetailData.job_title || 'Looking for Job'}`;
                }
            }
            return 'JobAd Opportunity';
        }

        function openShareModal() {
            const modal = document.getElementById('share-modal');
            if (modal) modal.classList.add('show');
        }

        function closeShareModal() {
            const modal = document.getElementById('share-modal');
            if (modal) modal.classList.remove('show');
        }

        function shareVia(platform) {
            const title = getShareTitle();
            const url = getShareUrl();
            const text = `Check out this opportunity on JobAd:\n\n${title}\n\n${url}`;
            
            let shareUrl = '';
            
            switch(platform) {
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
                    break;
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(title)}`;
                    break;
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
                    break;
                case 'linkedin':
                    shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
                    break;
                case 'telegram':
                    shareUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`;
                    break;
                case 'instagram':
                case 'copy':
                    navigator.clipboard.writeText(text).then(() => {
                        showToast(platform === 'instagram' ? '📸 Link copied! Open Instagram to share.' : '📋 Link copied to clipboard!');
                    }).catch(() => {
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        textarea.remove();
                        showToast(platform === 'instagram' ? '📸 Link copied! Open Instagram to share.' : '📋 Link copied to clipboard!');
                    });
                    closeShareModal();
                    return;
                case 'more':
                    if (navigator.share) {
                        navigator.share({
                            title: title,
                            text: text,
                            url: url
                        }).then(() => {
                            console.log('✅ Shared successfully');
                        }).catch((err) => {
                            if (err.name !== 'AbortError') {
                                console.error('Share error:', err);
                                showToast('⚠️ Share cancelled or failed');
                            }
                        });
                    } else {
                        navigator.clipboard.writeText(text).then(() => {
                            showToast('📋 Link copied! Use your device share menu.');
                        }).catch(() => {
                            const textarea = document.createElement('textarea');
                            textarea.value = text;
                            document.body.appendChild(textarea);
                            textarea.select();
                            document.execCommand('copy');
                            textarea.remove();
                            showToast('📋 Link copied! Use your device share menu.');
                        });
                    }
                    closeShareModal();
                    return;
                default:
                    showToast('⚠️ Share option not available');
                    return;
            }
            
            if (shareUrl) {
                window.open(shareUrl, '_blank');
            }
            closeShareModal();
        }

        function shareFromFeed(event, targetType, targetId) {
            event.stopPropagation();
            
            const item = feedItems.find(i => {
                const id = i.type === 'JOB' ? i._raw?.job_id : i._raw?.mobile;
                return i.type === targetType && id == targetId;
            });

            if (item && item._raw) {
                currentDetailData = item._raw;
                currentDetailType = item.type;
                
                incrementShareCount(targetType, targetId);
                
                openShareModal();
            } else {
                showToast('⚠️ Could not find item');
            }
        }

        // ============================================================
        // INCREMENT SHARE COUNT
        // ============================================================
        async function incrementShareCount(targetType, targetId) {
            try {
                const table = targetType === 'JOB' ? 'active_jobs' : 'active_users';
                const idField = targetType === 'JOB' ? 'job_id' : 'mobile';
                
                const { data, error } = await sb
                    .from(table)
                    .select('share_count')
                    .eq(idField, targetId)
                    .single();
                
                if (error) throw error;
                
                const currentCount = data?.share_count || 0;
                const newCount = currentCount + 1;
                
                const { error: updateError } = await sb
                    .from(table)
                    .update({ share_count: newCount })
                    .eq(idField, targetId);
                
                if (updateError) throw updateError;
                
                console.log(`✅ Share count incremented: ${newCount}`);
                
                if (currentDetailData && currentDetailType === targetType) {
                    const targetIdValue = targetType === 'JOB' ? currentDetailData.job_id : currentDetailData.mobile;
                    if (targetIdValue == targetId) {
                        currentDetailData.share_count = newCount;
                        updateDetailStats();
                    }
                }
                
                feedItems = feedItems.map(item => {
                    const itemId = item.type === 'JOB' ? item._raw?.job_id : item._raw?.mobile;
                    if (item.type === targetType && itemId == targetId) {
                        if (item._raw) {
                            item._raw.share_count = newCount;
                        }
                        item.share_count = newCount;
                    }
                    return item;
                });
                
                renderFeed();
                
                return newCount;
            } catch (err) {
                console.error('❌ Error incrementing share count:', err);
                return null;
            }
        }

        // ============================================================
        // HANDLE SHARE CLICK
        // ============================================================
        function handleShareClick() {
            if (!currentDetailData || !currentDetailType) {
                showToast('⚠️ No item selected');
                return;
            }
            
            const targetId = currentDetailType === 'JOB' ? currentDetailData.job_id : currentDetailData.mobile;
            
            incrementShareCount(currentDetailType, targetId);
            
            openShareModal();
        }

        // ============================================================
        // UPDATE DETAIL STATS
        // ============================================================
        function updateDetailStats() {
            if (!currentDetailData) return;
            
            const endorsements = currentDetailData.endorsements || [];
            const shareCount = currentDetailData.share_count || 0;
            const totalPopularity = endorsements.length + shareCount;
            
            const totalEl = document.getElementById('detail-total-popularity');
            const flagsEl = document.getElementById('detail-flags-count');
            const viewsEl = document.getElementById('detail-views');
            
            if (totalEl) totalEl.textContent = totalPopularity;
            if (flagsEl) flagsEl.textContent = (currentDetailData.flags || []).length;
            if (viewsEl) viewsEl.textContent = currentDetailData.views || 0;
        }

        // ============================================================
        // SEARCHABLE ZONE
        // ============================================================
        function searchZone() {
            const input = document.getElementById('zone-search');
            const suggestions = document.getElementById('zone-suggestions');
            if (!input || !suggestions) return;
            const query = input.value.toLowerCase().trim();
            if (!query) {
                suggestions.classList.remove('show');
                return;
            }
            const matches = ZONES.filter(zone => zone.zone_name.toLowerCase().includes(query));
            if (matches.length === 0) {
                suggestions.innerHTML = '<div class="no-result">No zones found</div>';
                suggestions.classList.add('show');
                return;
            }
            suggestions.innerHTML = matches.map(zone => `
                <div class="item" onclick="selectZone(${zone.zone_id}, '${zone.zone_name}')">
                    📍 ${zone.zone_name}
                </div>
            `).join('');
            suggestions.classList.add('show');
        }

        function selectZone(zoneId, zoneName) {
            document.getElementById('zone-search').value = zoneName;
            const suggestions = document.getElementById('zone-suggestions');
            if (suggestions) suggestions.classList.remove('show');
            selectedZoneId = zoneId;
            selectedAreaId = null;
            document.getElementById('zone-status').textContent = zoneName;
            const areaSelect = document.getElementById('filter-area');
            if (areaSelect) {
                const areas = getAreasByZone(zoneId);
                areaSelect.innerHTML = '<option value="ALL">All areas</option>';
                areas.forEach(area => {
                    areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
                });
            }
            renderFeed();
        }

        function onAreaFilterChange() {
            const areaSelect = document.getElementById('filter-area');
            if (areaSelect) {
                selectedAreaId = areaSelect.value !== 'ALL' ? parseInt(areaSelect.value) : null;
            }
            renderFeed();
        }

        function autoDetectLocation() {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    const city = data.city || '';
                    const matched = ZONES.find(zone => 
                        city.toLowerCase().includes(zone.zone_name.toLowerCase()) ||
                        zone.zone_name.toLowerCase().includes(city.toLowerCase())
                    );
                    if (matched) {
                        selectZone(matched.zone_id, matched.zone_name);
                        document.getElementById('zone-search').value = matched.zone_name + ' (Detected)';
                    }
                })
                .catch(() => {
                    selectZone(100, 'Hyderabad');
                    document.getElementById('zone-search').value = 'Hyderabad (Default)';
                });
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function showMessage(msg, type) {
            const el = document.getElementById('msg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMessage() { 
            const el = document.getElementById('msg');
            if (el) el.classList.add('hidden'); 
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function resetForm() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('home-page').classList.add('hidden-page');
            document.getElementById('profile-page').classList.add('hidden-page');
            document.getElementById('edit-seeker-page').classList.add('hidden-page');
            document.getElementById('postjob-page').classList.add('hidden-page');
            document.getElementById('detail-page').classList.add('hidden-page');
            document.getElementById('login-screen').style.display = 'flex';
            document.querySelectorAll('.avatar-btn').forEach(btn => {
                btn.style.display = 'flex';
            });
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('reg-pin').value = '';
            document.getElementById('reg-pin-confirm').value = '';
            document.querySelectorAll('.otp-input').forEach(el => {
                el.value = '';
                el.classList.remove('filled');
            });
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('mobile-status').textContent = '';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '🔐 Login';
            document.getElementById('register-btn').disabled = false;
            document.getElementById('register-btn').textContent = '✅ Create Account';
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            currentMobile = '';
            currentUser = null;
            isGuest = false;
            isChecking = false;
            document.getElementById('mobile').focus();
            document.getElementById('guest-banner').style.display = 'none';
            sessionStorage.removeItem('guest_session');
        }

        function setStatus(text, type) {
            const el = document.getElementById('mobile-status');
            if (!el) return;
            const colors = { green: 'text-green-600', blue: 'text-blue-600', yellow: 'text-yellow-600', red: 'text-red-600', gray: 'text-slate-400' };
            el.textContent = text;
            el.className = 'text-xs mt-1 ' + (colors[type] || colors.gray);
        }

        // ============================================================
        // LOGOUT
        // ============================================================
        window.logout = function() {
            if (confirm('Are you sure you want to logout?')) {
                resetForm();
                showToast('👋 Logged out');
            }
        };

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const aboutTextarea = document.getElementById('edit-seeker-about');
            const charCount = document.getElementById('char-count');
            if (aboutTextarea && charCount) {
                aboutTextarea.addEventListener('input', function() {
                    charCount.textContent = this.value.length;
                });
            }

            const salaryInput = document.getElementById('edit-seeker-salary');
            if (salaryInput) {
                salaryInput.addEventListener('input', function() {
                    const rawValue = parseSalaryValue(this.value);
                    if (rawValue) {
                        const formatted = formatSalaryDisplay(rawValue);
                        this.value = formatted;
                        this.setSelectionRange(this.value.length, this.value.length);
                    }
                });
            }

            populateEditZones();

            setupCounter('pj-title', 'pj-title-counter', 60);
            setupCounter('pj-skills', 'pj-skills-counter', 200);
            setupCounter('pj-description', 'pj-desc-counter', 500);

            const pjSalary = document.getElementById('pj-salary');
            if (pjSalary) {
                pjSalary.addEventListener('input', function() {
                    const raw = this.value.replace(/[^0-9]/g, '');
                    if (raw) {
                        const formatted = Number(raw).toLocaleString('en-IN');
                        this.value = formatted;
                    } else {
                        this.value = '';
                    }
                });
            }

            const expiryInput = document.getElementById('pj-expiry');
            if (expiryInput) {
                const d = new Date();
                d.setDate(d.getDate() + 30);
                expiryInput.value = d.toISOString().split('T')[0];
                expiryInput.max = new Date(Date.now() + 45*24*60*60*1000).toISOString().split('T')[0];
                expiryInput.min = new Date(Date.now() + 1*24*60*60*1000).toISOString().split('T')[0];
                expiryInput.addEventListener('change', function() {
                    const selected = new Date(this.value);
                    const maxDate = new Date(Date.now() + 45*24*60*60*1000);
                    if (selected > maxDate) {
                        alert('⚠️ Expiry date cannot be more than 45 days from today.');
                        this.value = maxDate.toISOString().split('T')[0];
                    }
                });
            }

            const zoneSelect = document.getElementById('pj-zone');
            if (zoneSelect) {
                zoneSelect.value = '100';
                updatePostAreas();
            }

            autoCleanExpiredJobs();

            const mobileInput = document.getElementById('mobile');
            if (mobileInput) {
                mobileInput.addEventListener('input', function(e) {
                    const mobile = this.value.trim();
                    const statusEl = document.getElementById('mobile-status');
                    
                    if (mobile.length === 10) {
                        autoCheckMobile(mobile);
                    } else if (mobile.length > 0 && mobile.length < 10) {
                        setStatus('Enter 10 digits', 'gray');
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('step3').classList.add('hidden');
                        document.getElementById('step4').classList.add('hidden');
                        document.getElementById('step1').style.display = 'block';
                    } else {
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('step3').classList.add('hidden');
                        document.getElementById('step4').classList.add('hidden');
                        document.getElementById('step1').style.display = 'block';
                        if (statusEl) statusEl.textContent = '';
                    }
                });
            }

            const pinInput = document.getElementById('pin');
            if (pinInput) {
                pinInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') submitPin();
                });
            }

            const regPinInput = document.getElementById('reg-pin');
            if (regPinInput) {
                regPinInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') document.getElementById('reg-pin-confirm').focus();
                });
            }

            const regPinConfirmInput = document.getElementById('reg-pin-confirm');
            if (regPinConfirmInput) {
                regPinConfirmInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') registerUser();
                });
            }

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.header-right')) closeDropdown();
            });

            // OTP input handling
            document.querySelectorAll('.otp-input').forEach((input, index, arr) => {
                input.addEventListener('input', function(e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value.length === 1) {
                        this.classList.add('filled');
                        if (index < arr.length - 1) {
                            arr[index + 1].focus();
                        } else {
                            const allFilled = Array.from(arr).every(el => el.value.length === 1);
                            if (allFilled) {
                                verifyOTP();
                            }
                        }
                    } else {
                        this.classList.remove('filled');
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        arr[index - 1].focus();
                        arr[index - 1].classList.remove('filled');
                    }
                    if (e.key === 'Enter') {
                        const allFilled = Array.from(arr).every(el => el.value.length === 1);
                        if (allFilled) {
                            verifyOTP();
                        } else {
                            const firstEmpty = Array.from(arr).find(el => el.value.length === 0);
                            if (firstEmpty) firstEmpty.focus();
                        }
                    }
                });

                input.addEventListener('focus', function() {
                    this.select();
                });
            });

            console.log('✅ JobAd Ready');

            const isRootPath = window.location.pathname === '/' || window.location.pathname === '/index.html';

            const shouldAutoLogin = (hasSharedLink || sessionStorage.getItem('guest_session') === 'true') && !isRootPath;

            if (shouldAutoLogin) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('home-page').classList.remove('hidden-page');
                
                if (hasSharedLink) {
                    document.getElementById('loading-overlay').classList.add('show');
                }
                
                autoLoginGuest();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('mobile').focus();
                document.getElementById('home-page').classList.add('hidden-page');
                if (isRootPath) {
                    sessionStorage.removeItem('guest_session');
                }
            }
        });

        console.log('✅ JobAd App Ready with all_users support');
    </script>
