<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... keep all existing styles ... */
        
        /* Add small style for area filter */
        .area-filter-select {
            width: 100%;
            padding: 6px 10px;
            font-size: 11px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-weight: 600;
            outline: none;
            margin-bottom: 0;
        }
        .area-filter-select:focus {
            border-color: #3b82f6;
        }
        .area-filter-select option:disabled {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <!-- ... keep all HTML same ... -->
    
    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // ZONE & AREA DATA (Built-in)
        // ============================================================
        const LOCATION_DATA = {
            zones: [
                { zone_id: 100, zone_name: "Hyderabad" },
                { zone_id: 200, zone_name: "North Telangana" },
                { zone_id: 300, zone_name: "East Telangana" },
                { zone_id: 400, zone_name: "South Telangana" }
            ],
            areas: [
                { area_id: 100001, zone_id: 100, area_name: "Kukatpally" },
                { area_id: 100002, zone_id: 100, area_name: "Madhapur" },
                { area_id: 100003, zone_id: 100, area_name: "Kondapur" },
                { area_id: 100004, zone_id: 100, area_name: "Gachibowli" },
                { area_id: 100005, zone_id: 100, area_name: "Hitech City" },
                { area_id: 100006, zone_id: 100, area_name: "Miyapur" },
                { area_id: 100007, zone_id: 100, area_name: "Uppal" },
                { area_id: 100008, zone_id: 100, area_name: "LB Nagar" },
                { area_id: 100009, zone_id: 100, area_name: "Dilsukhnagar" },
                { area_id: 200001, zone_id: 200, area_name: "Nizamabad" },
                { area_id: 200002, zone_id: 200, area_name: "Karimnagar" },
                { area_id: 200003, zone_id: 200, area_name: "Adilabad" },
                { area_id: 200004, zone_id: 200, area_name: "Mancherial" },
                { area_id: 200005, zone_id: 200, area_name: "Jagtial" },
                { area_id: 300001, zone_id: 300, area_name: "Warangal" },
                { area_id: 300002, zone_id: 300, area_name: "Hanumakonda" },
                { area_id: 300003, zone_id: 300, area_name: "Khammam" },
                { area_id: 300004, zone_id: 300, area_name: "Mahabubabad" },
                { area_id: 400001, zone_id: 400, area_name: "Mahabubnagar" },
                { area_id: 400002, zone_id: 400, area_name: "Nalgonda" },
                { area_id: 400003, zone_id: 400, area_name: "Suryapet" },
                { area_id: 400004, zone_id: 400, area_name: "Nagarkurnool" }
            ]
        };

        // ============================================================
        // Helper Functions
        // ============================================================
        function getZones() {
            return LOCATION_DATA.zones;
        }

        function getAreas(zoneId) {
            return LOCATION_DATA.areas.filter(a => a.zone_id === zoneId);
        }

        function getZoneName(zoneId) {
            const zone = LOCATION_DATA.zones.find(z => z.zone_id === zoneId);
            return zone ? zone.zone_name : 'Unknown Zone';
        }

        function getAreaName(areaId) {
            const area = LOCATION_DATA.areas.find(a => a.area_id === areaId);
            return area ? area.area_name : 'Unknown Area';
        }

        // ============================================================
        // STATE
        // ============================================================
        let currentMobile = '';
        let actionType = '';
        let currentUser = null;
        let isChecking = false;
        let currentFilter = 'BOTH';
        let selectedZoneId = null;
        let selectedAreaId = null;
        let feedItems = [];

        // ============================================================
        // FETCH DATA FROM SUPABASE
        // ============================================================
        async function fetchFeedData() {
            console.log('🔄 Fetching feed data from Supabase...');
            
            try {
                // Fetch jobs from active_jobs
                const { data: jobs, error: jobsError } = await sb
                    .from('active_jobs')
                    .select('*')
                    .order('job_id', { ascending: false })
                    .limit(50);
                
                if (jobsError) throw jobsError;
                
                // Fetch seeker profiles from active_users (only those with full_name)
                const { data: seekers, error: seekersError } = await sb
                    .from('active_users')
                    .select('*')
                    .not('full_name', 'is', null)
                    .limit(50);
                
                if (seekersError) throw seekersError;
                
                // Format jobs
                const formattedJobs = jobs.map(job => ({
                    type: 'JOB',
                    title: job.job_title || 'Untitled Job',
                    exp: parseInt(job.min_experience_years) || 0,
                    skills: job.skills_comma_separated || '',
                    zone_id: job.zone_id || 0,
                    area_id: job.area_id || 0,
                    location: `${getZoneName(job.zone_id)} - ${getAreaName(job.area_id)}`,
                    salary: job.max_salary_monthly ? `₹${job.max_salary_monthly}` : 'Negotiable',
                    company: job.company_name || 'Unknown Company',
                    desc: job.job_description || '',
                    contact: job.mobile || 'N/A'
                }));
                
                // Format seekers
                const formattedSeekers = seekers.map(user => ({
                    type: 'SEEKER',
                    title: user.job_title || 'Job Seeker',
                    exp: parseInt(user.total_experience_years) || 0,
                    skills: user.skills_comma_separated || '',
                    zone_id: user.zone_id || 0,
                    area_id: user.area_id || 0,
                    location: `${getZoneName(user.zone_id)} - ${getAreaName(user.area_id)}`,
                    salary: user.expected_salary_monthly ? `₹${user.expected_salary_monthly}` : 'Not specified',
                    company: user.full_name || 'Anonymous',
                    desc: user.professional_summary || '',
                    contact: user.mobile || 'N/A'
                }));
                
                feedItems = [...formattedJobs, ...formattedSeekers];
                console.log(`✅ Loaded ${feedItems.length} items (${formattedJobs.length} jobs, ${formattedSeekers.length} seekers)`);
                
                renderFeed();
                
            } catch (err) {
                console.error('Error fetching feed:', err);
                showMessage('Failed to load feed data: ' + err.message, 'red');
            }
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function showMessage(msg, type) {
            const el = document.getElementById('msg');
            el.textContent = msg;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('msg').classList.add('hidden');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function togglePin() {
            const input = document.getElementById('pin');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('mobile-status').textContent = '';
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').className = 'btn-green';
            document.getElementById('submitBtn').disabled = false;
            currentMobile = '';
            actionType = '';
            currentUser = null;
            isChecking = false;
            document.getElementById('mobile').focus();
        }

        function setStatus(text, type) {
            const el = document.getElementById('mobile-status');
            const colors = {
                green: 'text-green-600',
                blue: 'text-blue-600',
                yellow: 'text-yellow-600',
                red: 'text-red-600',
                gray: 'text-slate-400'
            };
            el.textContent = text;
            el.className = 'text-xs mt-1 ' + (colors[type] || colors.gray);
        }

        function showPinScreen(mobile, status, statusType, btnText, btnClass) {
            currentMobile = mobile;
            document.getElementById('display-mobile').textContent = mobile;
            document.getElementById('status-badge').textContent = status;
            document.getElementById('status-badge').className = 'text-sm font-medium text-' + statusType + '-600';
            document.getElementById('submitBtn').textContent = btnText;
            document.getElementById('submitBtn').className = 'btn-' + btnClass;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('pin').value = '';
            document.getElementById('pin').focus();
            hideMessage();
        }

        // ============================================================
        // SEARCHABLE ZONE
        // ============================================================
        function searchZone() {
            const input = document.getElementById('zone-search');
            const suggestions = document.getElementById('zone-suggestions');
            const query = input.value.toLowerCase().trim();

            if (!query) {
                suggestions.classList.remove('show');
                return;
            }

            const zones = getZones();
            const matches = zones.filter(zone => 
                zone.zone_name.toLowerCase().includes(query)
            );
            
            if (matches.length === 0) {
                suggestions.innerHTML = '<div class="no-result">No zones found</div>';
                suggestions.classList.add('show');
                return;
            }

            suggestions.innerHTML = matches.map(zone => `
                <div class="item" onclick="selectZone(${zone.zone_id}, '${zone.zone_name}')">
                    📍 ${zone.zone_name}
                </div>
            `).join('');
            suggestions.classList.add('show');
        }

        function selectZone(zoneId, zoneName) {
            document.getElementById('zone-search').value = zoneName;
            document.getElementById('zone-suggestions').classList.remove('show');
            selectedZoneId = zoneId;
            selectedAreaId = null;
            document.getElementById('zone-status').textContent = zoneName;
            
            // Update area filter dropdown
            updateAreaFilter(zoneId);
            renderFeed();
        }

        function updateAreaFilter(zoneId) {
            const areaSelect = document.getElementById('filter-area');
            const areas = getAreas(zoneId);
            
            areaSelect.innerHTML = '<option value="ALL">All areas</option>';
            areas.forEach(area => {
                areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
            });
        }

        function onAreaFilterChange() {
            const areaSelect = document.getElementById('filter-area');
            selectedAreaId = areaSelect.value !== 'ALL' ? parseInt(areaSelect.value) : null;
            renderFeed();
        }

        function autoDetectLocation() {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    const city = data.city || '';
                    const zones = getZones();
                    const matched = zones.find(zone => 
                        city.toLowerCase().includes(zone.zone_name.toLowerCase()) ||
                        zone.zone_name.toLowerCase().includes(city.toLowerCase())
                    );
                    if (matched) {
                        selectZone(matched.zone_id, matched.zone_name);
                        document.getElementById('zone-search').value = matched.zone_name + ' (Detected)';
                    }
                })
                .catch(() => {
                    selectZone(100, 'Hyderabad');
                    document.getElementById('zone-search').value = 'Hyderabad (Default)';
                });
        }

        // Close suggestions on outside click
        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.zone-filter .search-wrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                document.getElementById('zone-suggestions').classList.remove('show');
            }
        });

        // Enter key support
        document.getElementById('zone-search').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const firstItem = document.querySelector('#zone-suggestions .item');
                if (firstItem) {
                    firstItem.click();
                }
            }
        });

        // ============================================================
        // FEED FUNCTIONS
        // ============================================================
        function setFilter(type) {
            currentFilter = type;
            const both = document.getElementById('filter-both');
            const job = document.getElementById('filter-job');
            const seeker = document.getElementById('filter-seeker');
            both.className = type === 'BOTH' ? 'active' : 'inactive';
            job.className = type === 'JOB' ? 'active' : 'inactive';
            seeker.className = type === 'SEEKER' ? 'active' : 'inactive';
            renderFeed();
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            const count = document.getElementById('results-count');
            let filtered = [...feedItems];

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-records">No data available. Please add jobs or seekers.</div>';
                count.textContent = 'Showing 0 Records';
                return;
            }

            if (currentFilter === 'JOB') {
                filtered = filtered.filter(item => item.type === 'JOB');
            } else if (currentFilter === 'SEEKER') {
                filtered = filtered.filter(item => item.type === 'SEEKER');
            }

            if (selectedZoneId) {
                filtered = filtered.filter(item => item.zone_id === selectedZoneId);
            }

            if (selectedAreaId) {
                filtered = filtered.filter(item => item.area_id === selectedAreaId);
            }

            const titleFilter = document.getElementById('filter-title').value.toLowerCase();
            if (titleFilter) {
                filtered = filtered.filter(item => item.title.toLowerCase().includes(titleFilter));
            }

            const skillsFilter = document.getElementById('filter-skills').value.toLowerCase();
            if (skillsFilter) {
                filtered = filtered.filter(item => item.skills.toLowerCase().includes(skillsFilter));
            }

            const expFilter = document.getElementById('filter-exp').value;
            if (expFilter === '0-2') {
                filtered = filtered.filter(item => item.exp <= 2);
            } else if (expFilter === '3-5') {
                filtered = filtered.filter(item => item.exp >= 3 && item.exp <= 5);
            } else if (expFilter === '5+') {
                filtered = filtered.filter(item => item.exp > 5);
            }

            count.textContent = `Showing ${filtered.length} Records`;

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-records">No records found matching your filters</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                const zoneName = getZoneName(item.zone_id);
                const areaName = getAreaName(item.area_id);
                const locationDisplay = areaName ? `${zoneName} - ${areaName}` : zoneName;
                
                return `
                <div class="feed-card" onclick="openDetail('${item.type}', '${item.title}', ${item.exp}, '${item.skills}', '${item.salary}', '${item.company}', '${item.desc}', '${locationDisplay}', '${item.contact}')">
                    <div class="title">${item.title}</div>
                    <div class="meta">${item.exp} yrs | 📍 ${locationDisplay} | ${item.salary}</div>
                    <span class="badge ${item.type === 'SEEKER' ? 'badge-seeker' : 'badge-job'}">${item.type === 'SEEKER' ? 'SEEKER' : 'JOB'}</span>
                </div>
            `}).join('');
        }

        function openDetail(type, title, exp, skills, salary, company, desc, location, contact) {
            alert(`📋 ${title}\n🏢 ${company}\n📍 ${location}\n💰 ${salary}\n📝 ${desc}`);
        }

        // ============================================================
        // AUTO-DETECT MOBILE
        // ============================================================
        document.getElementById('mobile').addEventListener('input', function(e) {
            const mobile = this.value.trim();
            const statusEl = document.getElementById('mobile-status');
            statusEl.textContent = '';
            if (mobile.length === 10) {
                autoCheckMobile(mobile);
            } else if (mobile.length > 0 && mobile.length < 10) {
                setStatus('Enter 10 digits', 'gray');
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            } else {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            }
        });

        async function autoCheckMobile(mobile) {
            if (isChecking) return;
            isChecking = true;
            const mobileInput = document.getElementById('mobile');
            mobileInput.disabled = true;
            setStatus('⏳ Checking...', 'blue');

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/check-mobile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });
                const data = await response.json();

                if (data.inActiveUsers) {
                    actionType = 'login';
                    showPinScreen(mobile, '✅ Existing user', 'green', '🔐 Login', 'green');
                    setStatus('✓ User found', 'green');
                } else if (data.inArchive) {
                    actionType = 'reactivate';
                    showPinScreen(mobile, '📋 Archived account', 'yellow', '🔄 Reactivate', 'yellow');
                    setStatus('📋 Archived', 'yellow');
                } else {
                    actionType = 'register';
                    showPinScreen(mobile, '📱 New user', 'blue', '📝 Register', 'green');
                    setStatus('✨ New user', 'blue');
                }
            } catch (err) {
                console.error('Error:', err);
                setStatus('❌ Error checking', 'red');
                showMessage('Error: ' + err.message, 'red');
            } finally {
                isChecking = false;
                mobileInput.disabled = false;
            }
        }

        // ============================================================
        // SUBMIT PIN
        // ============================================================
        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMessage('Enter 4-digit PIN', 'red');
                document.getElementById('pin').focus();
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Processing...';
            showMessage('Processing...', 'blue');

            try {
                let endpoint = '';
                if (actionType === 'login') endpoint = '/login-user';
                else if (actionType === 'reactivate') endpoint = '/reactivate-user';
                else endpoint = '/register-user';

                const response = await fetch(`${EDGE_FUNCTION_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });

                const data = await response.json();

                if (data.success) {
                    const { data: userData, error } = await sb
                        .from('active_users')
                        .select('*')
                        .eq('mobile', currentMobile)
                        .single();

                    if (error) {
                        showMessage('Error fetching user data', 'red');
                        return;
                    }

                    if (userData) {
                        currentUser = userData;
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('home-screen').classList.remove('hidden');
                        hideMessage();
                        
                        // Auto-detect location
                        setTimeout(autoDetectLocation, 500);
                        
                        // Fetch feed data from Supabase
                        await fetchFeedData();
                        
                        showToast('✅ Welcome ' + currentMobile + '!');
                    }
                } else {
                    showMessage('❌ ' + data.error, 'red');
                    document.getElementById('pin').value = '';
                    document.getElementById('pin').focus();
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'red');
            } finally {
                submitBtn.disabled = false;
                const btnText = actionType === 'login' ? '🔐 Login' : actionType === 'reactivate' ? '🔄 Reactivate' : '📝 Register';
                submitBtn.textContent = btnText;
            }
        };

        // ============================================================
        // LOGOUT
        // ============================================================
        window.logout = function() {
            if (confirm('Are you sure you want to logout?')) {
                resetForm();
                showToast('👋 Logged out');
            }
        };

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('pin').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                window.submitPin();
            }
        });

        // ============================================================
        // APP INIT
        // ============================================================
        console.log('✅ JobAd Login App Ready');
        console.log('📍 Built-in zones:', getZones().length, 'zones');
        console.log('📱 Test users: 9876543210 (PIN: 1234)');
        document.getElementById('mobile').focus();
    </script>
</body>
</html>
