<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600">JobAd</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Telangana Zone Based Jobs</p>
        
        <div class="flex justify-center gap-4 mb-6 text-xs">
            <a href="test.html" class="text-blue-500">🔌 Test DB</a>
            <a href="test-edge.html" class="text-purple-500">🚀 Test Edge</a>
        </div>
        
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter Mobile Number" class="w-full p-3 border rounded-lg mb-3">
            <button onclick="checkMobile()" class="w-full bg-blue-600 text-white p-3 rounded-lg">Check Mobile</button>
        </div>
        
        <div id="step2" style="display:none">
            <input type="password" id="pin" placeholder="Enter PIN" maxlength="4" class="w-full p-3 border rounded-lg mb-3">
            <button onclick="submitPin()" class="w-full bg-green-600 text-white p-3 rounded-lg">Submit</button>
            <button onclick="resetForm()" class="w-full bg-gray-500 text-white p-2 rounded-lg mt-2 text-sm">Back</button>
        </div>
        
        <div id="message" class="mt-4 p-3 rounded-lg text-center"></div>
    </div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentMobile = '';
        let isExistingUser = false;
        
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.innerHTML = msg;
            if (type === 'error') {
                div.className = 'mt-4 p-3 rounded-lg text-center bg-red-100 text-red-700';
            } else if (type === 'success') {
                div.className = 'mt-4 p-3 rounded-lg text-center bg-green-100 text-green-700';
            } else {
                div.className = 'mt-4 p-3 rounded-lg text-center bg-blue-100 text-blue-700';
            }
        }
        
        window.checkMobile = async function() {
            const mobile = document.getElementById('mobile').value.trim();
            if (!mobile || mobile.length !== 10) {
                showMessage('Enter 10-digit mobile', 'error');
                return;
            }
            currentMobile = mobile;
            showMessage('Checking...', 'info');
            try {
                const res = await fetch('https://njhioapckeupxrcixmdh.supabase.co/functions/v1/sync-google-sheets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });
                const data = await res.json();
                isExistingUser = data.exists && data.inActiveUsers;
                showMessage(isExistingUser ? '✅ Enter your PIN' : '📱 Create a PIN', 'success');
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('pin').value = '';
            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }
        };
        
        window.submitPin = async function() {
            const pin = document.getElementById('pin').value.trim();
            if (!pin || pin.length !== 4) {
                showMessage('Enter 4-digit PIN', 'error');
                return;
            }
            showMessage('Processing...', 'info');
            try {
                if (isExistingUser) {
                    const { data: user } = await supabase.from('active_users').select('pin_hash').eq('mobile', currentMobile).single();
                    if (user && user.pin_hash === pin) {
                        showMessage('✅ Welcome ' + currentMobile, 'success');
                        setTimeout(resetForm, 2000);
                    } else {
                        showMessage('❌ Wrong PIN', 'error');
                        document.getElementById('pin').value = '';
                    }
                } else {
                    await supabase.from('active_users').insert([{ mobile: currentMobile, pin_hash: pin, created_at: new Date().toISOString() }]);
                    const { data: stats } = await supabase.from('platform_stats').select('mobile_list').single();
                    if (stats && !stats.mobile_list.includes(currentMobile)) {
                        await supabase.from('platform_stats').update({ mobile_list: [...stats.mobile_list, currentMobile] });
                    }
                    showMessage('✅ Registered! Welcome ' + currentMobile, 'success');
                    setTimeout(resetForm, 2000);
                }
            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }
        };
        
        window.resetForm = function() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('message').innerHTML = '';
            currentMobile = '';
        };
    </script>
</body>
</html>
