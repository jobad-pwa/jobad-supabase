<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Supabase Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-2xl font-bold mb-4 text-center">JobAd Supabase Test</h1>
        
        <div id="status" class="p-4 rounded-lg mb-4 bg-yellow-100 text-yellow-700">
            ⏳ Testing Supabase connection...
        </div>
        
        <div class="space-y-3">
            <input type="tel" id="test-mobile" placeholder="Enter Mobile Number" class="w-full p-2 border rounded">
            <button onclick="testMobileFunction()" class="w-full bg-blue-600 text-white p-2 rounded">Test Mobile</button>
        </div>
        
        <div id="result" class="mt-4 p-4 rounded-lg hidden"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';  // REPLACE THIS
        
        let supabaseClient = null;
        
        window.testMobileFunction = async function() {
            const mobile = document.getElementById('test-mobile').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '⏳ Checking...';
            resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
            
            if (!mobile || mobile.length !== 10) {
                resultDiv.innerHTML = '❌ Please enter 10-digit mobile number';
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                return;
            }
            
            try {
                // Query platform_stats table (NOT mobile_list)
                const { data, error } = await supabaseClient
                    .from('platform_stats')
                    .select('mobile_list')
                    .single();
                
                if (error) throw error;
                
                const mobileList = data?.mobile_list || [];
                const mobileExists = mobileList.includes(mobile);
                
                if (mobileExists) {
                    resultDiv.innerHTML = `✅ Mobile ${mobile} FOUND in platform_stats mobile_list!`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 text-green-700';
                    
                    // Check if user exists in active_users
                    const { data: userData } = await supabaseClient
                        .from('active_users')
                        .select('mobile, full_name')
                        .eq('mobile', mobile)
                        .single();
                    
                    if (userData) {
                        resultDiv.innerHTML += `<br>✓ User exists in active_users. Name: ${userData.full_name || 'Not set'}`;
                    } else {
                        resultDiv.innerHTML += `<br>⚠ User NOT in active_users. Ready for registration.`;
                    }
                } else {
                    resultDiv.innerHTML = `📱 Mobile ${mobile} NOT found. You can register as new user.`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
                }
                
            } catch (err) {
                console.error('Error:', err);
                resultDiv.innerHTML = `❌ Error: ${err.message}`;
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
            }
        };
        
        async function initSupabase() {
            const statusDiv = document.getElementById('status');
            
            if (SUPABASE_ANON_KEY === 'YOUR_ANON_KEY_HERE') {
                statusDiv.innerHTML = '❌ Please replace YOUR_ANON_KEY_HERE with your actual Supabase anon key!';
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
                return;
            }
            
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Test connection by getting platform_stats
                const { data, error } = await supabaseClient.from('platform_stats').select('mobile_list').single();
                
                if (error) throw error;
                
                statusDiv.innerHTML = '✅ Connected to Supabase successfully! Using platform_stats table.';
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-green-100 text-green-700';
                
                // Show current mobile list
                const mobileCount = data?.mobile_list?.length || 0;
                statusDiv.innerHTML += `<br>📱 ${mobileCount} mobile numbers in list.`;
                
            } catch (err) {
                statusDiv.innerHTML = `❌ Connection failed: ${err.message}`;
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
            }
        }
        
        initSupabase();
    </script>
</body>
</html>
