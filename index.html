<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Supabase Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-2xl font-bold mb-4 text-center">JobAd Supabase Test</h1>
        
        <div id="status" class="p-4 rounded-lg mb-4 bg-yellow-100 text-yellow-700">
            ⏳ Testing Supabase connection...
        </div>
        
        <div class="space-y-3">
            <input type="tel" id="test-mobile" placeholder="Enter Mobile Number" class="w-full p-2 border rounded">
            <button onclick="testMobileFunction()" class="w-full bg-blue-600 text-white p-2 rounded">Test Mobile</button>
        </div>
        
        <div id="result" class="mt-4 p-4 rounded-lg hidden"></div>
    </div>

    <script>
        // YOUR SUPABASE KEY - REPLACE THIS
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';  // <--- CHANGE THIS
        
        console.log('Script loaded');
        console.log('Supabase URL:', SUPABASE_URL);
        
        // Create global variable
        let supabaseClient = null;
        
        // Test function
        window.testMobileFunction = async function() {
            console.log('testMobileFunction called');
            
            const mobileInput = document.getElementById('test-mobile');
            const mobile = mobileInput ? mobileInput.value : '';
            const resultDiv = document.getElementById('result');
            
            if (!resultDiv) return;
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '⏳ Checking...';
            resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
            
            console.log('Mobile number:', mobile);
            
            if (!mobile || mobile.length !== 10) {
                resultDiv.innerHTML = '❌ Please enter 10-digit mobile number';
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                return;
            }
            
            try {
                if (!supabaseClient) {
                    resultDiv.innerHTML = '❌ Supabase not initialized. Check if ANON KEY is correct.';
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                    return;
                }
                
                resultDiv.innerHTML = '⏳ Querying mobile_list table...';
                
                const { data, error } = await supabaseClient
                    .from('mobile_list')
                    .select('*')
                    .eq('mobile_number', mobile);
                
                console.log('Query result:', data, error);
                
                if (error) {
                    resultDiv.innerHTML = `❌ Database error: ${error.message}`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                    return;
                }
                
                if (data && data.length > 0) {
                    resultDiv.innerHTML = `✅ Mobile ${mobile} FOUND in mobile_list! First seen: ${data[0].first_seen}`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 text-green-700';
                } else {
                    resultDiv.innerHTML = `📱 Mobile ${mobile} NOT found in mobile_list. You can register.`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
                }
                
            } catch (err) {
                console.error('Error:', err);
                resultDiv.innerHTML = `❌ Error: ${err.message}`;
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
            }
        };
        
        // Initialize Supabase on page load
        async function initSupabase() {
            console.log('initSupabase started');
            
            const statusDiv = document.getElementById('status');
            
            if (!statusDiv) return;
            
            if (SUPABASE_ANON_KEY === 'YOUR_ANON_KEY_HERE') {
                statusDiv.innerHTML = '❌ Please replace YOUR_ANON_KEY_HERE with your actual Supabase anon key!';
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
                return;
            }
            
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase client created');
                
                // Test the connection
                const { data, error } = await supabaseClient.from('mobile_list').select('count', { count: 'exact', head: true });
                
                if (error) {
                    console.error('Connection test error:', error);
                    statusDiv.innerHTML = `❌ Supabase connection failed: ${error.message}`;
                    statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
                } else {
                    console.log('Connection test success');
                    statusDiv.innerHTML = '✅ Connected to Supabase successfully! You can now test mobile numbers.';
                    statusDiv.className = 'p-4 rounded-lg mb-4 bg-green-100 text-green-700';
                }
                
            } catch (err) {
                console.error('Init error:', err);
                statusDiv.innerHTML = `❌ Error: ${err.message}`;
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
            }
        }
        
        // Start when page loads
        initSupabase();
        
        console.log('Script finished loading');
    </script>
</body>
</html>
