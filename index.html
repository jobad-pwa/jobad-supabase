<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green {
            background: #dcfce7;
            color: #166534;
        }
        .msg-red {
            background: #fee2e2;
            color: #991b1b;
        }
        .msg-blue {
            background: #dbeafe;
            color: #1e40af;
        }
        .hidden {
            display: none;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>
        
        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
            <a href="test-edge.html">🚀 Edge Test</a>
        </div>
        
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button onclick="checkMobile()">Check Mobile</button>
        </div>
        
        <div id="step2" class="hidden">
            <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
            <button onclick="submitPin()">Submit</button>
            <button onclick="resetForm()" class="btn-back">Back</button>
        </div>
        
        <div id="msg" class="hidden"></div>
    </div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        
        let supabase;
        let currentMobile = '';
        let isExistingUser = false;
        
        // Initialize Supabase
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('Supabase ready');
        } catch(e) {
            console.log('Supabase error:', e);
        }
        
        function showMsg(text, type) {
            var div = document.getElementById('msg');
            div.textContent = text;
            div.className = 'msg msg-' + type;
            div.classList.remove('hidden');
        }
        
        function hideMsg() {
            document.getElementById('msg').classList.add('hidden');
        }
        
        // Check mobile in Supabase
        window.checkMobile = async function() {
            var mobile = document.getElementById('mobile').value.trim();
            if (!mobile || mobile.length !== 10) {
                showMsg('Enter 10-digit mobile number', 'red');
                return;
            }
            
            currentMobile = mobile;
            showMsg('Checking...', 'blue');
            
            try {
                // Check if user exists in active_users
                const { data: user, error } = await supabase
                    .from('active_users')
                    .select('mobile')
                    .eq('mobile', mobile)
                    .single();
                
                if (user) {
                    isExistingUser = true;
                    showMsg('✅ User found! Enter your PIN (1234 for demo)', 'green');
                } else {
                    isExistingUser = false;
                    showMsg('📱 New user! Create a PIN to register', 'green');
                }
                
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                hideMsg();
                
            } catch (err) {
                // If user not found
                if (err.message.includes('No rows found')) {
                    isExistingUser = false;
                    showMsg('📱 New user! Create a PIN to register', 'green');
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    hideMsg();
                } else {
                    showMsg('Error: ' + err.message, 'red');
                }
            }
        };
        
        // Submit PIN to Supabase
        window.submitPin = async function() {
            var pin = document.getElementById('pin').value.trim();
            if (!pin || pin.length !== 4) {
                showMsg('Enter 4-digit PIN', 'red');
                return;
            }
            
            showMsg('Processing...', 'blue');
            
            try {
                if (isExistingUser) {
                    // LOGIN - Check PIN
                    const { data: user, error } = await supabase
                        .from('active_users')
                        .select('pin_hash')
                        .eq('mobile', currentMobile)
                        .single();
                    
                    if (user && user.pin_hash === pin) {
                        showMsg('✅ Login successful! Welcome ' + currentMobile, 'green');
                        setTimeout(resetForm, 2000);
                    } else {
                        showMsg('❌ Wrong PIN. Try 1234 for demo users', 'red');
                        document.getElementById('pin').value = '';
                    }
                } else {
                    // REGISTER - Create new user
                    const { error } = await supabase
                        .from('active_users')
                        .insert([{
                            mobile: currentMobile,
                            pin_hash: pin,
                            created_at: new Date().toISOString()
                        }]);
                    
                    if (error) {
                        showMsg('Registration failed: ' + error.message, 'red');
                        return;
                    }
                    
                    showMsg('✅ Registered! Welcome ' + currentMobile, 'green');
                    setTimeout(resetForm, 2000);
                }
            } catch (err) {
                showMsg('Error: ' + err.message, 'red');
            }
        };
        
        // Reset form
        window.resetForm = function() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            currentMobile = '';
            isExistingUser = false;
        };
        
        console.log('App ready with Supabase');
    </script>
</body>
</html>
