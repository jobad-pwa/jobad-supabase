<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-back:hover {
            background: #4b5563;
        }
        .btn-green {
            background: #16a34a;
        }
        .btn-green:hover {
            background: #15803d;
        }
        .btn-yellow {
            background: #d97706;
        }
        .btn-yellow:hover {
            background: #b45309;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .msg-yellow { background: #fef3c7; color: #92400e; }
        .hidden { display: none; }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            user-select: none;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>

        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
        </div>

        <!-- STEP 1: Mobile Input -->
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button onclick="checkMobile()" id="checkBtn">Check Mobile</button>
        </div>

        <!-- STEP 2: PIN Input -->
        <div id="step2" class="hidden">
            <div class="password-wrapper">
                <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
                <span class="toggle-password" onclick="togglePin()">👁️</span>
            </div>
            <button onclick="submitPin()" id="submitBtn" class="btn-green">Submit</button>
            <button onclick="resetForm()" class="btn-back">Back</button>
        </div>

        <!-- Message Display -->
        <div id="msg" class="hidden"></div>

        <!-- Dashboard (shown after login) -->
        <div id="dashboard" class="hidden" style="margin-top: 20px;">
            <div class="msg msg-green" style="text-align:center;">
                ✅ Logged in as <span id="dash-mobile"></span>
            </div>
            <button onclick="logout()" class="btn-back" style="margin-top: 12px;">🚪 Logout</button>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // STATE
        // ============================================================
        let currentMobile = '';
        let actionType = ''; // 'login', 'register', 'reactivate'
        let currentUser = null;

        // ============================================================
        // UI HELPERS
        // ============================================================
        function showMessage(msg, type) {
            const el = document.getElementById('msg');
            el.textContent = msg;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('msg').classList.add('hidden');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function togglePin() {
            const input = document.getElementById('pin');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('checkBtn').textContent = 'Check Mobile';
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').className = 'btn-green';
            currentMobile = '';
            actionType = '';
            currentUser = null;
        }

        // ============================================================
        // STEP 1: CHECK MOBILE
        // ============================================================
        window.checkMobile = async function() {
            console.log('checkMobile called');
            const mobile = document.getElementById('mobile').value.trim();

            if (!mobile || mobile.length !== 10) {
                showMessage('Enter 10-digit mobile', 'red');
                return;
            }

            currentMobile = mobile;
            showMessage('Checking...', 'blue');

            try {
                const response = await fetch(`${EDGE_FUNCTION_URL}/check-mobile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });

                const data = await response.json();
                console.log('Check response:', data);

                if (data.inActiveUsers) {
                    // Active user - Login
                    actionType = 'login';
                    showMessage('✅ User found! Enter your PIN', 'green');
                    document.getElementById('submitBtn').textContent = '🔐 Login';
                    document.getElementById('submitBtn').className = 'btn-green';
                } else if (data.inArchive) {
                    // Archived user - Reactivate
                    actionType = 'reactivate';
                    showMessage('📋 Archived account! Create PIN to reactivate', 'yellow');
                    document.getElementById('submitBtn').textContent = '🔄 Reactivate';
                    document.getElementById('submitBtn').className = 'btn-yellow';
                } else {
                    // New user - Register
                    actionType = 'register';
                    showMessage('📱 New user! Create a PIN to register', 'blue');
                    document.getElementById('submitBtn').textContent = '📝 Register';
                    document.getElementById('submitBtn').className = 'btn-green';
                }

                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('pin').value = '';
                hideMessage();

            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'red');
            }
        };

        // ============================================================
        // STEP 2: SUBMIT PIN
        // ============================================================
        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMessage('Enter 4-digit PIN', 'red');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Processing...';
            showMessage('Processing...', 'blue');

            try {
                let endpoint = '';
                if (actionType === 'login') endpoint = '/login-user';
                else if (actionType === 'reactivate') endpoint = '/reactivate-user';
                else endpoint = '/register-user';

                const response = await fetch(`${EDGE_FUNCTION_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: currentMobile, pin: pin })
                });

                const data = await response.json();
                console.log('Auth response:', data);

                if (data.success) {
                    // Fetch user data
                    const { data: userData, error } = await sb
                        .from('active_users')
                        .select('*')
                        .eq('mobile', currentMobile)
                        .single();

                    if (error) {
                        showMessage('Error fetching user data', 'red');
                        return;
                    }

                    if (userData) {
                        currentUser = userData;
                        // Show dashboard
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        document.getElementById('dash-mobile').textContent = currentMobile;
                        hideMessage();
                        showToast('✅ Welcome ' + currentMobile + '!');
                    }
                } else {
                    showMessage('❌ ' + data.error, 'red');
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'red');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = actionType === 'login' ? '🔐 Login' : '📝 Register';
            }
        };

        // ============================================================
        // LOGOUT
        // ============================================================
        window.logout = function() {
            if (confirm('Are you sure you want to logout?')) {
                resetForm();
                showToast('👋 Logged out');
            }
        };

        // ============================================================
        // APP INIT
        // ============================================================
        console.log('✅ JobAd Login App Ready');
        console.log('📱 Test users: 9876543210 (PIN: 1234)');
    </script>
</body>
</html>
