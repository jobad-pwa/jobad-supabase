<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobAd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* All existing styles remain the same */
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 20px 18px 10px 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 780px;
            position: relative;
            overflow: hidden;
        }
        .hidden { display: none; }
        .hidden-page { display: none; }
        
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
            text-align: center;
            background: white;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
            outline-offset: -1px;
        }
        .input-field::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-back:hover { background: #4b5563; }
        
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }
        .btn-yellow { background: #d97706; }
        .btn-yellow:hover { background: #b45309; }
        
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .msg-yellow { background: #fef3c7; color: #92400e; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        .mobile-display { font-size: 20px; font-weight: bold; color: #1e293b; padding: 4px 0; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        #login-screen h1 {
            font-size: 40px;
            font-weight: 900;
            color: #2563eb;
            margin: 0 0 4px 0;
        }
        #login-screen .test-links {
            margin-bottom: 24px;
            font-size: 12px;
        }
        #login-screen .test-links a {
            color: #3b82f6;
            text-decoration: none;
        }
        .mobile-status { font-size: 12px; color: #94a3b8; margin-top: 4px; }

        .pin-login-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 8px;
            margin: 8px 0 12px 0;
            background: white;
            transition: border-color 0.2s;
        }
        .pin-login-input:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
            outline-offset: -1px;
        }
        .pin-login-input::placeholder {
            letter-spacing: 2px;
            font-size: 14px;
            color: #94a3b8;
        }

        .otp-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
        }
        .otp-input-group input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            padding: 0;
            margin: 0;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: white;
        }
        .otp-input-group input:focus {
            border-color: #2563eb;
            outline: none;
        }
        .otp-input-group input.filled {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .timer-text { font-size: 13px; color: #64748b; margin-top: 8px; }
        .resend-btn {
            background: none;
            border: none;
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
            padding: 4px;
            font-size: 14px;
        }
        .resend-btn:hover { text-decoration: underline; }
        .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .home-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }
        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            flex-shrink: 0;
            border-bottom: 1px solid #f1f5f9;
            position: relative;
        }
        .home-header .logo {
            font-size: 22px;
            font-weight: 900;
            color: #2563eb;
            cursor: pointer;
        }
        .home-header .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .home-header .avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            transition: 0.2s;
            padding: 0;
        }
        .home-header .avatar-btn:hover { border-color: #2563eb; background: #eff6ff; }
        .home-header .avatar-btn.male { color: #2563eb; border-color: #2563eb; }
        .home-header .avatar-btn.female { color: #ec4899; border-color: #ec4899; }
        .home-header .avatar-btn.other { color: #8b5cf6; border-color: #8b5cf6; }

        .profile-dropdown {
            position: absolute;
            top: 44px;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            min-width: 180px;
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        .profile-dropdown.show { display: block; }
        .profile-dropdown .dropdown-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: 0.15s;
        }
        .profile-dropdown .dropdown-item:hover { background: #f8fafc; }
        .profile-dropdown .dropdown-item .icon { font-size: 16px; }
        .profile-dropdown .dropdown-divider {
            height: 1px;
            background: #e2e8f0;
            margin: 4px 12px;
        }
        .profile-dropdown .dropdown-item.danger { color: #dc2626; }
        .profile-dropdown .dropdown-item.danger:hover { background: #fef2f2; }

        .page-content {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 8px 0;
        }
        .page-content::-webkit-scrollbar { width: 3px; }
        .page-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .home-top { flex-shrink: 0; padding-bottom: 6px; }
        .zone-filter {
            background: #0f172a;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        .zone-filter .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .zone-filter .header label {
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .zone-filter .header span {
            font-size: 8px;
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
            padding: 1px 8px;
            border-radius: 4px;
            font-weight: 700;
        }
        .zone-filter .search-wrapper { position: relative; }
        .zone-filter .search-wrapper input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 5px 12px;
            font-size: 11px;
            color: white;
            font-weight: 600;
            outline: none;
            margin-bottom: 0;
        }
        .zone-filter .search-wrapper input::placeholder { color: #64748b; }
        .zone-filter .search-wrapper input:focus { border-color: #3b82f6; }
        .zone-filter .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            margin-top: 4px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .zone-filter .suggestions.show { display: block; }
        .zone-filter .suggestions .item {
            padding: 6px 12px;
            font-size: 12px;
            color: #e2e8f0;
            cursor: pointer;
        }
        .zone-filter .suggestions .item:hover { background: #334155; }
        .zone-filter .suggestions .no-result {
            padding: 8px 12px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }

        .type-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            background: #e2e8f0;
            padding: 3px;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .type-buttons button {
            padding: 4px;
            font-size: 10px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .type-buttons .active { background: white; color: #1e293b; }
        .type-buttons .inactive { background: transparent; color: #64748b; }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 4px;
        }
        .filter-row label {
            font-size: 8px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 1px;
        }
        .filter-row input, .filter-row select {
            width: 100%;
            padding: 4px 8px;
            font-size: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-weight: 600;
            outline: none;
            margin-bottom: 0;
        }

        .results-count {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 3px;
            margin-bottom: 6px;
        }
        .results-count span {
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-bottom: 4px;
        }
        .feed-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .feed-card:hover { border-color: #3b82f6; background: #f8faff; }
        .feed-card .title {
            font-weight: 700;
            font-size: 14px;
            color: #0f172a;
        }
        .feed-card .title.job-title { color: #1e40af; }
        .feed-card .title.seeker-name { color: #166534; }
        .feed-card .meta {
            font-size: 10px;
            color: #475569;
            margin-top: 1px;
        }
        .feed-card .meta .highlight {
            font-weight: 600;
            color: #2563eb;
        }
        
        .feed-card .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
            gap: 4px;
            flex-wrap: nowrap;
        }
        .feed-card .badge {
            font-size: 8px;
            padding: 1px 8px;
            border-radius: 4px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .feed-card .badge-job { background: #dbeafe; color: #1e40af; }
        .feed-card .badge-seeker { background: #dcfce7; color: #166534; }
        
        .feed-card .action-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            flex-shrink: 0;
        }
        .feed-card .action-row .action-item {
            display: flex;
            align-items: center;
            gap: 2px;
            color: #475569;
            font-weight: 500;
            white-space: nowrap;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .feed-card .action-row .action-item:hover {
            background: #f1f5f9;
        }
        .feed-card .action-row .action-item .count {
            font-weight: 600;
        }
        .feed-card .action-row .action-divider {
            color: #e2e8f0;
            font-size: 14px;
        }
        .feed-card .action-row .share-btn {
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: 0.15s;
            background: #25D366;
            color: white;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            min-width: 28px;
            min-height: 28px;
        }
        .feed-card .action-row .share-btn:hover {
            background: #1da851;
            transform: scale(1.05);
        }
        .feed-card .action-row .share-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .no-records { text-align: center; padding: 30px 0; color: #94a3b8; font-size: 13px; }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 8px;
            margin-top: 4px;
            flex-shrink: 0;
            background: white;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #94a3b8;
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            padding: 3px 12px;
            border-radius: 8px;
            background: none;
            border: none;
            width: auto;
        }
        .bottom-nav .nav-item:hover { color: #3b82f6; }
        .bottom-nav .nav-item.active { color: #2563eb; }
        .bottom-nav .nav-item .icon { font-size: 18px; margin-bottom: 1px; }
        .bottom-nav .nav-item .label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

        .profile-header-card {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            margin-bottom: 16px;
        }
        .profile-header-card .welcome { font-size: 11px; opacity: 0.8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .profile-header-card .mobile { font-size: 22px; font-weight: 700; margin: 2px 0; }
        .profile-header-card .badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 12px; border-radius: 12px; display: inline-block; }

        .profile-section {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .profile-section .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .profile-section .section-title { font-size: 14px; font-weight: 700; color: #1e293b; }
        .profile-section .section-badge {
            font-size: 9px;
            background: #fef3c7;
            color: #d97706;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 700;
        }
        .profile-section .section-desc { font-size: 12px; color: #64748b; margin-bottom: 10px; }
        .profile-section .section-btn {
            padding: 8px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .profile-section .section-btn:hover { background: #1d4ed8; }
        .profile-section .section-btn-green { background: #16a34a; }
        .profile-section .section-btn-green:hover { background: #15803d; }
        .profile-active { background: #f0fdf4; border-color: #bbf7d0; }
        .profile-active .section-badge { background: #dcfce7; color: #166534; }

        .action-required {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .action-required .icon { font-size: 20px; }
        .action-required .text { font-size: 12px; color: #92400e; }
        .action-required .text strong { display: block; font-size: 13px; }
        .action-required .btn-action {
            background: #2563eb;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: auto;
            flex-shrink: 0;
        }
        .action-required .btn-action:hover { background: #1d4ed8; }

        .edit-page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 12px;
        }
        .edit-page-header h2 {
            font-size: 16px;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
            white-space: nowrap;
        }
        .edit-page-header .cancel-btn {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .edit-page-header .cancel-btn:hover {
            color: #64748b;
        }

        .edit-hint {
            background: #eff6ff;
            border-left: 3px solid #3b82f6;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
        }
        .edit-hint .hint-title { font-size: 12px; font-weight: 700; color: #1d4ed8; }
        .edit-hint .hint-desc { font-size: 11px; color: #475569; margin-top: 2px; }

        .edit-field { margin-bottom: 10px; }
        .edit-field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 2px;
        }
        .edit-field label .limit-hint { font-size: 9px; color: #94a3b8; font-weight: 400; }
        .edit-field input, .edit-field select, .edit-field textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }
        .edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus { border-color: #2563eb; }
        .edit-field textarea { resize: vertical; min-height: 50px; }

        .salary-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .salary-input-wrapper .currency-symbol {
            position: absolute;
            left: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            pointer-events: none;
        }
        .salary-input-wrapper input { padding-left: 28px; text-align: left; }

        .char-counter { text-align: right; font-size: 10px; color: #94a3b8; margin-top: 2px; }
        .edit-activate-btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }
        .edit-activate-btn:hover { background: #1d4ed8; }

        .postjob-header, .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            flex-shrink: 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .postjob-header .logo, .detail-header .logo {
            font-size: 22px;
            font-weight: 900;
            color: #2563eb;
            cursor: pointer;
        }
        .postjob-header .cancel-btn, .detail-header .cancel-btn {
            font-size: 14px;

        function selectZone(zoneId, zoneName) {
            document.getElementById('zone-search').value = zoneName;
            const suggestions = document.getElementById('zone-suggestions');
            if (suggestions) suggestions.classList.remove('show');
            selectedZoneId = zoneId;
            selectedAreaId = null;
            document.getElementById('zone-status').textContent = zoneName;
            const areaSelect = document.getElementById('filter-area');
            if (areaSelect) {
                const areas = getAreasByZone(zoneId);
                areaSelect.innerHTML = '<option value="ALL">All areas</option>';
                areas.forEach(area => {
                    areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
                });
            }
            renderFeed();
        }

        // ============================================================
        // FIX: searchZone - Don't show duplicate Hyderabad
        // ============================================================
        function searchZone() {
            const input = document.getElementById('zone-search');
            const suggestions = document.getElementById('zone-suggestions');
            if (!input || !suggestions) return;
            const query = input.value.toLowerCase().trim();
            if (!query) {
                suggestions.classList.remove('show');
                return;
            }
            const seen = new Set();
            const matches = ZONES.filter(zone => {
                if (seen.has(zone.zone_id)) return false;
                if (zone.zone_name.toLowerCase().includes(query)) {
                    seen.add(zone.zone_id);
                    return true;
                }
                return false;
            });
            if (matches.length === 0) {
                suggestions.innerHTML = '<div class="no-result">No zones found</div>';
                suggestions.classList.add('show');
                return;
            }
            suggestions.innerHTML = matches.map(zone => `
                <div class="item" onclick="selectZone(${zone.zone_id}, '${zone.zone_name}')">
                    📍 ${zone.zone_name}
                </div>
            `).join('');
            suggestions.classList.add('show');
        }

        // ZONE HELPER FUNCTIONS
        // ============================================================
        function getZoneName(id) {
            const z = ZONES.find(z => z.zone_id === id);
            return z ? z.zone_name : 'Unknown';
        }

        function getAreaName(id) {
            const a = AREAS.find(a => a.area_id === id);
            return a ? a.area_name : '';
        }

        function getAreasByZone(zoneId) {
            return AREAS.filter(a => a.zone_id === zoneId);
        }

        function populateEditZones() {
            const select = document.getElementById('edit-seeker-zone');
            if (!select) return;
            select.innerHTML = '<option value="">-- Select --</option>';
            ZONES.forEach(zone => {
                select.innerHTML += `<option value="${zone.zone_id}">📍 ${zone.zone_name}</option>`;
            });
        }

        function updateEditAreas() {
            const zoneId = parseInt(document.getElementById('edit-seeker-zone').value);
            const areaSelect = document.getElementById('edit-seeker-area');
            areaSelect.innerHTML = '<option value="">Select zone first</option>';
            if (zoneId) {
                const areas = getAreasByZone(zoneId);
                areas.forEach(area => {
                    areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
                });
            }
        }

        console.log('✅ JobAd App Ready');

        if (hasSharedLink) {
            setTimeout(() => {
                if (!sharedLinkProcessed && currentUser) {
                    console.log('🔄 Fallback: Processing shared link after delay');
                    processSharedLinkAfterLogin();
                }
            }, 3000);
        }
