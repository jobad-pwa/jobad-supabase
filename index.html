<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin: 0 0 8px 0;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2563eb;
            outline: 2px solid #93c5fd;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-back {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-back:hover {
            background: #4b5563;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-green { background: #dcfce7; color: #166534; }
        .msg-red { background: #fee2e2; color: #991b1b; }
        .msg-blue { background: #dbeafe; color: #1e40af; }
        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>

        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
        </div>

        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button onclick="checkMobile()">Check Mobile</button>
        </div>

        <div id="step2" class="hidden">
            <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
            <button onclick="submitPin()">Submit</button>
            <button onclick="resetForm()" class="btn-back">Back</button>
        </div>

        <div id="msg" class="hidden"></div>
    </div>

    <script>
        console.log('Script started');

        const SB_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';

        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let curMobile = '';
        let isUser = false;

        function showMsg(txt, type) {
            const el = document.getElementById('msg');
            el.textContent = txt;
            el.className = 'msg msg-' + type;
            el.classList.remove('hidden');
        }

        function hideMsg() {
            document.getElementById('msg').classList.add('hidden');
        }

        // Step 1: Check Mobile using Edge Function
        window.checkMobile = async function() {
            console.log('checkMobile called');
            const mobile = document.getElementById('mobile').value.trim();

            if (!mobile || mobile.length !== 10) {
                showMsg('Enter 10-digit mobile', 'red');
                return;
            }

            curMobile = mobile;
            showMsg('Checking...', 'blue');

            try {
                // Call Edge Function
                const response = await fetch('https://njhioapckeupxrcixmdh.supabase.co/functions/v1/sync-google-sheets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });

                const data = await response.json();
                console.log('Edge response:', data);

                // Check if user exists
                if (data.exists && data.inActiveUsers) {
                    isUser = true;
                    showMsg('✅ User found! Enter your PIN', 'green');
                } else {
                    isUser = false;
                    if (data.exists && !data.inActiveUsers) {
                        showMsg('📋 Account found! Create a PIN to activate', 'green');
                    } else {
                        showMsg('📱 New user! Create a PIN to register', 'green');
                    }
                }

                // Show PIN input
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('pin').value = '';
                hideMsg();

            } catch (err) {
                console.error('Error:', err);
                showMsg('Error: ' + err.message, 'red');
            }
        };

        // Step 2: Submit PIN
        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();

            if (!pin || pin.length !== 4) {
                showMsg('Enter 4-digit PIN', 'red');
                return;
            }

            showMsg('Processing...', 'blue');

            try {
                if (isUser) {
                    // LOGIN: Check PIN from Supabase
                    const { data: user, error } = await sb
                        .from('active_users')
                        .select('pin_hash')
                        .eq('mobile', curMobile)
                        .single();

                    if (error) {
                        console.error('Login error:', error);
                        showMsg('Error checking user', 'red');
                        return;
                    }

                    if (user && user.pin_hash === pin) {
                        showMsg('✅ Welcome ' + curMobile + '!', 'green');
                        setTimeout(resetForm, 2000);
                    } else {
                        showMsg('❌ Wrong PIN. Try 1234', 'red');
                        document.getElementById('pin').value = '';
                    }
                } else {
                    // REGISTER: Create new user
                    const { error } = await sb
                        .from('active_users')
                        .insert([{
                            mobile: curMobile,
                            pin_hash: pin,
                            full_name: '',
                            job_title: '',
                            created_at: new Date().toISOString(),
                            last_active: new Date().toISOString()
                        }]);

                    if (error) {
                        console.error('Registration error:', error);
                        showMsg('Registration failed: ' + error.message, 'red');
                        return;
                    }

                    // Add to platform_stats
                    try {
                        const { data: stats } = await sb
                            .from('platform_stats')
                            .select('mobile_list')
                            .single();

                        if (stats && !stats.mobile_list.includes(curMobile)) {
                            await sb
                                .from('platform_stats')
                                .update({ mobile_list: [...stats.mobile_list, curMobile] });
                        }
                    } catch (statsErr) {
                        console.log('Stats update skipped:', statsErr);
                    }

                    showMsg('✅ Registered! Welcome ' + curMobile, 'green');
                    setTimeout(resetForm, 2000);
                }
            } catch (err) {
                console.error('Error:', err);
                showMsg('Error: ' + err.message, 'red');
            }
        };

        window.resetForm = function() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('msg').classList.add('hidden');
            curMobile = '';
            isUser = false;
        };

        console.log('Script ready');
    </script>
</body>
</html>
