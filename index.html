<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Smart Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600">JobAd</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Telangana Zone Based Jobs</p>
        
        <!-- Test Links -->
        <div class="flex justify-center gap-4 mb-6 text-xs">
            <a href="test.html" class="text-blue-500 hover:underline">🔌 Test DB</a>
            <a href="test-edge.html" class="text-purple-500 hover:underline">🚀 Test Edge</a>
        </div>
        
        <!-- Step 1: Mobile Input -->
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter Mobile Number" class="w-full p-3 border rounded-lg mb-3">
            <button onclick="checkMobile()" class="w-full bg-blue-600 text-white p-3 rounded-lg">Check Mobile</button>
        </div>
        
        <!-- Step 2: PIN Input -->
        <div id="step2" style="display:none">
            <input type="password" id="pin" placeholder="Enter PIN" maxlength="4" class="w-full p-3 border rounded-lg mb-3">
            <button onclick="submitPin()" class="w-full bg-green-600 text-white p-3 rounded-lg">Submit</button>
            <button onclick="resetForm()" class="w-full bg-gray-500 text-white p-2 rounded-lg mt-2 text-sm">Back</button>
        </div>
        
        <!-- Message -->
        <div id="message" class="mt-4 p-3 rounded-lg text-center"></div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentMobile = '';
        let isExistingUser = false;
        
        // Show message function
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.innerHTML = msg;
            if (type === 'error') {
                div.className = 'mt-4 p-3 rounded-lg text-center bg-red-100 text-red-700';
            } else if (type === 'success') {
                div.className = 'mt-4 p-3 rounded-lg text-center bg-green-100 text-green-700';
            } else {
                div.className = 'mt-4 p-3 rounded-lg text-center bg-blue-100 text-blue-700';
            }
        }
        
        // Check Mobile Function
        window.checkMobile = async function() {
            console.log('checkMobile called');
            const mobile = document.getElementById('mobile').value.trim();
            
            if (!mobile || mobile.length !== 10) {
                showMessage('Please enter 10-digit mobile number', 'error');
                return;
            }
            
            currentMobile = mobile;
            showMessage('Checking mobile number...', 'info');
            
            try {
                const response = await fetch('https://njhioapckeupxrcixmdh.supabase.co/functions/v1/sync-google-sheets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });
                
                const data = await response.json();
                console.log('Edge response:', data);
                
                if (data.exists && data.inActiveUsers) {
                    isExistingUser = true;
                    showMessage('✅ User found! Enter your PIN to login.', 'success');
                } else {
                    isExistingUser = false;
                    showMessage('📱 New user! Create a PIN to register.', 'success');
                }
                
                // Show PIN input
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('pin').value = '';
                
            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'error');
            }
        };
        
        // Submit PIN Function
        window.submitPin = async function() {
            console.log('submitPin called');
            const pin = document.getElementById('pin').value.trim();
            
            if (!pin || pin.length !== 4) {
                showMessage('Please enter 4-digit PIN', 'error');
                return;
            }
            
            showMessage('Processing...', 'info');
            
            try {
                if (isExistingUser) {
                    // LOGIN
                    const { data: user, error } = await supabase
                        .from('active_users')
                        .select('pin_hash')
                        .eq('mobile', currentMobile)
                        .single();
                    
                    if (error) {
                        showMessage('User not found', 'error');
                        return;
                    }
                    
                    if (user && user.pin_hash === pin) {
                        showMessage('✅ Login successful! Welcome ' + currentMobile, 'success');
                        setTimeout(resetForm, 2000);
                    } else {
                        showMessage('❌ Wrong PIN. Please try again.', 'error');
                        document.getElementById('pin').value = '';
                    }
                } else {
                    // REGISTER
                    const newUser = {
                        mobile: currentMobile,
                        pin_hash: pin,
                        full_name: '',
                        job_title: '',
                        created_at: new Date().toISOString(),
                        last_active: new Date().toISOString()
                    };
                    
                    const { error: insertError } = await supabase
                        .from('active_users')
                        .insert([newUser]);
                    
                    if (insertError) {
                        showMessage('Registration failed: ' + insertError.message, 'error');
                        return;
                    }
                    
                    // Add to platform_stats
                    const { data: stats } = await supabase
                        .from('platform_stats')
                        .select('mobile_list')
                        .single();
                    
                    if (stats && !stats.mobile_list.includes(currentMobile)) {
                        await supabase
                            .from('platform_stats')
                            .update({ mobile_list: [...stats.mobile_list, currentMobile] });
                    }
                    
                    showMessage('✅ Registration successful! Welcome ' + currentMobile, 'success');
                    setTimeout(resetForm, 2000);
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Error: ' + err.message, 'error');
            }
        };
        
        // Reset Form
        window.resetForm = function() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('mobile').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('message').innerHTML = '';
            currentMobile = '';
            isExistingUser = false;
        };
        
        console.log('App ready - single file version');
    </script>
</body>
</html>
