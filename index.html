<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobAd · Post Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .phone-frame {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            height: 95vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* fixed header */
        .app-header {
            flex-shrink: 0;
            padding: 16px 18px 10px 18px;
            background: white;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-header .logo {
            font-size: 22px;
            font-weight: 800;
            color: #2563eb;
            letter-spacing: -0.3px;
        }
        .app-header .cancel-btn {
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            background: none;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.2s;
        }
        .app-header .cancel-btn:hover { background: #f3f4f6; }
        /* scrollable middle */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 18px 20px 18px;
            background: #fafbfc;
        }
        .scroll-area::-webkit-scrollbar { width: 3px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        /* bottom nav fixed */
        .bottom-nav {
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 12px 10px 12px;
            background: white;
            border-top: 1px solid #f0f2f5;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 12px;
            transition: 0.2s;
        }
        .bottom-nav .nav-item .icon { font-size: 20px; margin-bottom: 2px; }
        .bottom-nav .nav-item.active { color: #2563eb; }
        .bottom-nav .nav-item:hover { color: #1e293b; }

        /* form styling */
        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: #1e293b;
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.02em;
        }
        .form-label .required { color: #ef4444; margin-left: 2px; }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            transition: 0.15s;
            outline: none;
            font-family: inherit;
        }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        .form-control::placeholder { color: #b0b8c4; font-weight: 400; }
        select.form-control { appearance: auto; }
        textarea.form-control { resize: vertical; min-height: 60px; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .field-group { margin-bottom: 14px; }

        .char-counter {
            text-align: right;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .publish-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .publish-btn:hover { background: #1d4ed8; }
        .publish-btn:active { transform: scale(0.98); }

        .inline-hint {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
            display: flex;
            justify-content: space-between;
        }

        /* salary adornment */
        .salary-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .salary-wrap .rupee {
            position: absolute;
            left: 12px;
            font-weight: 600;
            color: #1e293b;
            font-size: 15px;
            pointer-events: none;
        }
        .salary-wrap .form-control { padding-left: 28px; }

        /* zone / area selects */
        .select-hint { font-size: 10px; color: #94a3b8; margin-top: 2px; }

        /* bottom spacer */
        .bottom-spacer { height: 4px; }
    </style>
</head>
<body>
<div class="phone-frame">

    <!-- ========== FIXED HEADER ========== -->
    <div class="app-header">
        <span class="logo">JobAd</span>
        <button class="cancel-btn" onclick="handleCancel()">Cancel</button>
    </div>

    <!-- ========== SCROLLABLE MIDDLE ========== -->
    <div class="scroll-area" id="scrollArea">

        <!-- company -->
        <div class="field-group">
            <label class="form-label">Company</label>
            <input class="form-control" type="text" id="company" placeholder="abc corp" value="abc corp">
        </div>

        <!-- job title + experience row -->
        <div class="grid-2">
            <div class="field-group">
                <label class="form-label">Job Title <span class="required">*</span></label>
                <input class="form-control" type="text" id="jobTitle" placeholder="e.g., Senior Developer" maxlength="60" value="Senior Developer">
                <div class="inline-hint"><span></span><span id="titleCounter">0/60</span></div>
            </div>
            <div class="field-group">
                <label class="form-label">Experience <span class="required">*</span></label>
                <select class="form-control" id="experience">
                    <option value="0-1">0-1 Years</option>
                    <option value="1-3">1-3 Years</option>
                    <option value="3-5" selected>3-5 Years</option>
                    <option value="5-8">5-8 Years</option>
                    <option value="8+">8+ Years</option>
                </select>
            </div>
        </div>

        <!-- salary + zone row -->
        <div class="grid-2">
            <div class="field-group">
                <label class="form-label">Salary <span class="required">*</span></label>
                <div class="salary-wrap">
                    <span class="rupee">₹</span>
                    <input class="form-control" type="text" id="salary" placeholder="15 LPA" value="15 LPA" maxlength="20">
                </div>
            </div>
            <div class="field-group">
                <label class="form-label">Job Location Zone <span class="required">*</span></label>
                <select class="form-control" id="jobZone" onchange="updateAreas()">
                    <option value="">-- Select Zone --</option>
                    <option value="100" selected>Hyderabad</option>
                    <option value="200">North Telangana</option>
                    <option value="300">East Telangana</option>
                    <option value="400">South Telangana</option>
                </select>
            </div>
        </div>

        <!-- specific area + skills row -->
        <div class="grid-2">
            <div class="field-group">
                <label class="form-label">Specific Area <span class="required">*</span></label>
                <select class="form-control" id="specificArea">
                    <option value="">Select zone first</option>
                </select>
                <div class="select-hint" id="areaHint">⬆️ Choose zone first</div>
            </div>
            <div class="field-group">
                <label class="form-label">Skills <span class="required">*</span></label>
                <input class="form-control" type="text" id="skills" placeholder="Python, AWS, Docker" value="Python, AWS, Docker" maxlength="120">
                <div class="inline-hint"><span></span><span id="skillsCounter">0/120</span></div>
            </div>
        </div>

        <!-- description (full width) -->
        <div class="field-group">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3" placeholder="Job details..." maxlength="300">Job details...</textarea>
            <div class="inline-hint"><span></span><span id="descCounter">0/300</span></div>
        </div>

        <!-- publish button -->
        <button class="publish-btn" onclick="publishJob()">📤 Publish Job</button>
        <div class="bottom-spacer"></div>
    </div>

    <!-- ========== FIXED BOTTOM NAV ========== -->
    <div class="bottom-nav">
        <button class="nav-item" onclick="goHome()">
            <span class="icon">🏠</span>
            <span class="label">Home</span>
        </button>
        <button class="nav-item active" onclick="goPostJob()">
            <span class="icon">➕</span>
            <span class="label">Post Job</span>
        </button>
        <button class="nav-item" onclick="goProfile()">
            <span class="icon">👤</span>
            <span class="label">Profile</span>
        </button>
    </div>
</div>

<script>
    // ============================================================
    // ZONE & AREA DATA (same as original)
    // ============================================================
    const ZONES = [
        { zone_id: 100, zone_name: "Hyderabad" },
        { zone_id: 200, zone_name: "North Telangana" },
        { zone_id: 300, zone_name: "East Telangana" },
        { zone_id: 400, zone_name: "South Telangana" }
    ];

    const AREAS = [
        { area_id: 100000, zone_id: 100, area_name: "All Hyderabad" },
        { area_id: 200000, zone_id: 200, area_name: "All North Telangana" },
        { area_id: 300000, zone_id: 300, area_name: "All East Telangana" },
        { area_id: 400000, zone_id: 400, area_name: "All South Telangana" },
        { area_id: 100001, zone_id: 100, area_name: "Kukatpally" },
        { area_id: 100002, zone_id: 100, area_name: "Madhapur" },
        { area_id: 100003, zone_id: 100, area_name: "Kondapur" },
        { area_id: 100004, zone_id: 100, area_name: "Gachibowli" },
        { area_id: 100005, zone_id: 100, area_name: "Hitech City" },
        { area_id: 100006, zone_id: 100, area_name: "Miyapur" },
        { area_id: 100007, zone_id: 100, area_name: "Uppal" },
        { area_id: 100008, zone_id: 100, area_name: "LB Nagar" },
        { area_id: 100009, zone_id: 100, area_name: "Dilsukhnagar" },
        { area_id: 100995, zone_id: 100, area_name: "Shamshabad" },
        { area_id: 100996, zone_id: 100, area_name: "Jadcharla" },
        { area_id: 100997, zone_id: 100, area_name: "Medak" },
        { area_id: 100998, zone_id: 100, area_name: "Sangareddy" },
        { area_id: 100999, zone_id: 100, area_name: "Zahirabad" },
        { area_id: 200001, zone_id: 200, area_name: "Adilabad" },
        { area_id: 200002, zone_id: 200, area_name: "Asifabad" },
        { area_id: 200003, zone_id: 200, area_name: "Mancherial" },
        { area_id: 200004, zone_id: 200, area_name: "Nirmal" },
        { area_id: 200005, zone_id: 200, area_name: "Nizamabad" },
        { area_id: 200006, zone_id: 200, area_name: "Jagtial" },
        { area_id: 200007, zone_id: 200, area_name: "Peddapalli" },
        { area_id: 200008, zone_id: 200, area_name: "Karimnagar" },
        { area_id: 200009, zone_id: 200, area_name: "Sircilla" },
        { area_id: 200010, zone_id: 200, area_name: "Kamareddy" },
        { area_id: 200011, zone_id: 200, area_name: "Siddipet" },
        { area_id: 300001, zone_id: 300, area_name: "Warangal" },
        { area_id: 300002, zone_id: 300, area_name: "Hanumakonda" },
        { area_id: 300003, zone_id: 300, area_name: "Khammam" },
        { area_id: 300004, zone_id: 300, area_name: "Bhupalpally" },
        { area_id: 300005, zone_id: 300, area_name: "Mulugu" },
        { area_id: 300006, zone_id: 300, area_name: "Mahabubabad" },
        { area_id: 300007, zone_id: 300, area_name: "Kothagudem" },
        { area_id: 300008, zone_id: 300, area_name: "Bhuvanagiri" },
        { area_id: 300009, zone_id: 300, area_name: "Jangaon" },
        { area_id: 400001, zone_id: 400, area_name: "Mahabubnagar" },
        { area_id: 400002, zone_id: 400, area_name: "Nalgonda" },
        { area_id: 400003, zone_id: 400, area_name: "Suryapet" },
        { area_id: 400004, zone_id: 400, area_name: "Nagarkurnool" },
        { area_id: 400005, zone_id: 400, area_name: "Vikarabad" },
        { area_id: 400006, zone_id: 400, area_name: "Narayanpet" },
        { area_id: 400007, zone_id: 400, area_name: "Wanaparthy" },
        { area_id: 400008, zone_id: 400, area_name: "Gadwal" }
    ];

    function getAreasByZone(zoneId) {
        return AREAS.filter(a => a.zone_id === zoneId);
    }

    // ============================================================
    // CHARACTER COUNTERS & VALIDATION
    // ============================================================
    function setupCounter(inputId, counterId, maxLen) {
        const input = document.getElementById(inputId);
        const counter = document.getElementById(counterId);
        if (!input || !counter) return;
        const update = () => {
            const len = input.value.length;
            counter.textContent = `${len}/${maxLen}`;
            if (len > maxLen) {
                input.value = input.value.slice(0, maxLen);
                counter.textContent = `${maxLen}/${maxLen}`;
            }
        };
        input.addEventListener('input', update);
        update(); // initial
    }

    // Salary formatting (allow LPA / numeric)
    function formatSalaryInput(e) {
        // keep as is, but we'll validate later
    }

    // ============================================================
    // AREA DROPDOWN UPDATE
    // ============================================================
    function updateAreas() {
        const zoneSelect = document.getElementById('jobZone');
        const areaSelect = document.getElementById('specificArea');
        const areaHint = document.getElementById('areaHint');
        const zoneId = parseInt(zoneSelect.value);
        areaSelect.innerHTML = '<option value="">Select zone first</option>';
        if (!zoneId) {
            areaHint.textContent = '⬆️ Choose zone first';
            return;
        }
        const areas = getAreasByZone(zoneId);
        if (areas.length === 0) {
            areaSelect.innerHTML = '<option value="">No areas</option>';
            areaHint.textContent = '⚠️ No areas for this zone';
            return;
        }
        areas.forEach(area => {
            areaSelect.innerHTML += `<option value="${area.area_id}">${area.area_name}</option>`;
        });
        areaHint.textContent = `✅ ${areas.length} areas available`;
        // auto-select first
        if (areas.length > 0) areaSelect.value = areas[0].area_id;
    }

    // ============================================================
    // PUBLISH JOB (mock + validation)
    // ============================================================
    function publishJob() {
        const company = document.getElementById('company').value.trim();
        const jobTitle = document.getElementById('jobTitle').value.trim();
        const experience = document.getElementById('experience').value;
        const salary = document.getElementById('salary').value.trim();
        const zone = document.getElementById('jobZone').value;
        const area = document.getElementById('specificArea').value;
        const skills = document.getElementById('skills').value.trim();
        const description = document.getElementById('description').value.trim();

        // validation
        if (!company) { alert('Please enter company name'); return; }
        if (!jobTitle) { alert('Job Title is required'); return; }
        if (jobTitle.length > 60) { alert('Job Title max 60 characters'); return; }
        if (!salary) { alert('Salary is required'); return; }
        if (!zone) { alert('Please select Job Location Zone'); return; }
        if (!area) { alert('Please select Specific Area'); return; }
        if (!skills) { alert('Skills are required'); return; }
        if (skills.length > 120) { alert('Skills max 120 characters'); return; }
        if (description.length > 300) { alert('Description max 300 characters'); return; }

        // mock success
        alert(`✅ Job Published!\n\nCompany: ${company}\nTitle: ${jobTitle}\nExperience: ${experience}\nSalary: ${salary}\nZone: ${zone}\nArea: ${area}\nSkills: ${skills}\nDescription: ${description.substring(0,60)}...`);
        // reset? optional
    }

    // ============================================================
    // NAVIGATION (mock)
    // ============================================================
    function goHome() {
        alert('🏠 Go to Home (mock)');
    }
    function goPostJob() {
        // already here
        document.querySelector('.bottom-nav .nav-item.active')?.classList.remove('active');
        document.querySelectorAll('.bottom-nav .nav-item')[1].classList.add('active');
    }
    function goProfile() {
        alert('👤 Go to Profile (mock)');
    }
    function handleCancel() {
        if (confirm('Cancel posting this job?')) {
            // reset fields (optional)
            document.getElementById('jobTitle').value = '';
            document.getElementById('company').value = '';
            document.getElementById('salary').value = '';
            document.getElementById('skills').value = '';
            document.getElementById('description').value = '';
            // reset counters via events
            document.querySelectorAll('input, textarea').forEach(el => {
                el.dispatchEvent(new Event('input'));
            });
            alert('Form cleared.');
        }
    }

    // ============================================================
    // INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        // setup counters
        setupCounter('jobTitle', 'titleCounter', 60);
        setupCounter('skills', 'skillsCounter', 120);
        setupCounter('description', 'descCounter', 300);

        // salary input: allow alphanumeric + LPA
        const salaryInput = document.getElementById('salary');
        salaryInput.addEventListener('input', function() {
            // just keep as typed, but we can sanitize if needed
        });

        // set default zone & area
        const zoneSelect = document.getElementById('jobZone');
        zoneSelect.value = '100'; // Hyderabad
        updateAreas();

        // highlight active nav
        document.querySelectorAll('.bottom-nav .nav-item').forEach((el, idx) => {
            el.classList.toggle('active', idx === 1);
        });

        console.log('✅ Post Job page ready (fixed header/footer, scrollable middle, 2-col grid, char counters)');
    });
</script>

</body>
</html>
