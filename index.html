<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Simple Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600">JobAd</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Test Version</p>
        
        <div>
            <input type="tel" id="mobile" placeholder="Enter Mobile Number" class="w-full p-3 border rounded-lg mb-3">
            <button id="checkBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg">Check Mobile</button>
        </div>
        
        <div id="message" class="mt-4 p-3 rounded-lg text-center"></div>
    </div>

    <script>
        // Simple test - just show alert when button clicked
        console.log('Script loaded');
        
        // Get button element
        const btn = document.getElementById('checkBtn');
        const mobileInput = document.getElementById('mobile');
        const messageDiv = document.getElementById('message');
        
        // Add click event
        btn.onclick = function() {
            const mobile = mobileInput.value.trim();
            console.log('Button clicked! Mobile:', mobile);
            
            if (!mobile) {
                messageDiv.innerHTML = 'Please enter a mobile number';
                messageDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
                return;
            }
            
            messageDiv.innerHTML = `You entered: ${mobile}`;
            messageDiv.className = 'mt-4 p-3 rounded-lg bg-green-100 text-green-700 text-center';
        };
        
        // Also log when page loads
        console.log('Page loaded, button ready');
    </script>
</body>
</html>
