<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .test-links {
            text-align: center;
            margin-bottom: 24px;
            font-size: 12px;
        }
        .test-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 8px;
        }
        .test-links a:hover {
            text-decoration: underline;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus {
            border-color: #2563eb;
            ring: 2px solid #93c5fd;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-gray {
            background: #6b7280;
            margin-top: 8px;
        }
        .btn-gray:hover {
            background: #4b5563;
        }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .msg-success {
            background: #dcfce7;
            color: #166534;
        }
        .msg-error {
            background: #fee2e2;
            color: #991b1b;
        }
        .msg-info {
            background: #dbeafe;
            color: #1e40af;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>JobAd</h1>
        <div class="sub">Telangana Zone Based Jobs</div>
        
        <div class="test-links">
            <a href="test.html">🔌 DB Test</a>
            <a href="test-edge.html">🚀 Edge Test</a>
        </div>
        
        <!-- Step 1 -->
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
            <button id="checkBtn">Check Mobile</button>
        </div>
        
        <!-- Step 2 -->
        <div id="step2" class="hidden">
            <input type="password" id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
            <button id="submitBtn">Submit</button>
            <button id="backBtn" class="btn-gray">Back</button>
        </div>
        
        <!-- Message -->
        <div id="msg" class="hidden"></div>
    </div>

    <script>
        (function() {
            console.log('Starting app...');
            
            // Config
            const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
            
            // Create supabase client
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // State
            let currentMobile = '';
            let isExistingUser = false;
            
            // Elements
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const msgDiv = document.getElementById('msg');
            const mobileInput = document.getElementById('mobile');
            const pinInput = document.getElementById('pin');
            
            function showMessage(text, type) {
                msgDiv.textContent = text;
                msgDiv.className = 'msg msg-' + type;
                msgDiv.classList.remove('hidden');
            }
            
            function hideMessage() {
                msgDiv.classList.add('hidden');
            }
            
            async function onCheckMobile() {
                console.log('Check mobile clicked');
                const mobile = mobileInput.value.trim();
                
                if (!mobile || mobile.length !== 10) {
                    showMessage('Please enter 10-digit mobile number', 'error');
                    return;
                }
                
                currentMobile = mobile;
                showMessage('Checking...', 'info');
                
                try {
                    const res = await fetch('https://njhioapckeupxrcixmdh.supabase.co/functions/v1/sync-google-sheets', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mobile: mobile })
                    });
                    
                    const data = await res.json();
                    console.log('Response:', data);
                    
                    isExistingUser = !!(data.exists && data.inActiveUsers);
                    
                    if (isExistingUser) {
                        showMessage('✅ User found! Enter your PIN', 'success');
                    } else {
                        showMessage('📱 New user! Create a PIN to register', 'success');
                    }
                    
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                    pinInput.value = '';
                    hideMessage();
                    
                } catch (err) {
                    console.error(err);
                    showMessage('Error: ' + err.message, 'error');
                }
            }
            
            async function onSubmitPin() {
                console.log('Submit PIN clicked');
                const pin = pinInput.value.trim();
                
                if (!pin || pin.length !== 4) {
                    showMessage('Please enter 4-digit PIN', 'error');
                    return;
                }
                
                showMessage('Processing...', 'info');
                
                try {
                    if (isExistingUser) {
                        // LOGIN
                        const { data: user } = await supabaseClient
                            .from('active_users')
                            .select('pin_hash')
                            .eq('mobile', currentMobile)
                            .single();
                        
                        if (user && user.pin_hash === pin) {
                            showMessage('✅ Welcome ' + currentMobile + '! Login successful', 'success');
                            setTimeout(resetForm, 2000);
                        } else {
                            showMessage('❌ Wrong PIN. Try again.', 'error');
                            pinInput.value = '';
                        }
                    } else {
                        // REGISTER
                        const { error } = await supabaseClient
                            .from('active_users')
                            .insert([{
                                mobile: currentMobile,
                                pin_hash: pin,
                                created_at: new Date().toISOString()
                            }]);
                        
                        if (error) {
                            showMessage('Registration failed: ' + error.message, 'error');
                            return;
                        }
                        
                        // Update platform_stats
                        const { data: stats } = await supabaseClient
                            .from('platform_stats')
                            .select('mobile_list')
                            .single();
                        
                        if (stats && !stats.mobile_list.includes(currentMobile)) {
                            await supabaseClient
                                .from('platform_stats')
                                .update({ mobile_list: [...stats.mobile_list, currentMobile] });
                        }
                        
                        showMessage('✅ Registered! Welcome ' + currentMobile, 'success');
                        setTimeout(resetForm, 2000);
                    }
                } catch (err) {
                    showMessage('Error: ' + err.message, 'error');
                }
            }
            
            function resetForm() {
                step1.classList.remove('hidden');
                step2.classList.add('hidden');
                mobileInput.value = '';
                pinInput.value = '';
                msgDiv.classList.add('hidden');
                currentMobile = '';
                isExistingUser = false;
            }
            
            // Attach events
            document.getElementById('checkBtn').onclick = onCheckMobile;
            document.getElementById('submitBtn').onclick = onSubmitPin;
            document.getElementById('backBtn').onclick = resetForm;
            
            console.log('App ready');
        })();
    </script>
</body>
</html>
