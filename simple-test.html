<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
</head>
<body>
    <h1>Simple Test Page</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        output.innerHTML = 'Step 1: Script loaded<br>';
        
        // Load Supabase
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = () => {
            output.innerHTML += 'Step 2: Supabase loaded<br>';
            
            const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
            
            output.innerHTML += 'Step 3: Creating Supabase client...<br>';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            output.innerHTML += 'Step 4: Testing connection...<br>';
            
            supabase.from('platform_stats').select('mobile_list').single()
                .then(result => {
                    output.innerHTML += 'Step 5: Success!<br>';
                    output.innerHTML += `<pre>${JSON.stringify(result.data, null, 2)}</pre>`;
                })
                .catch(err => {
                    output.innerHTML += `❌ Error: ${err.message}<br>`;
                });
        };
        script.onerror = () => {
            output.innerHTML += '❌ Failed to load Supabase script!<br>';
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
