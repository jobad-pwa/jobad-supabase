<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Edge Function Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-2xl font-bold mb-4 text-center">Edge Function Test</h1>
        
        <div id="status" class="p-4 rounded-lg mb-4 bg-blue-100 text-blue-700">
            Click the button below to test the Edge Function
        </div>
        
        <div class="space-y-3">
            <input type="tel" id="mobile-input" placeholder="Enter Mobile Number" class="w-full p-2 border rounded" value="9876543210">
            <button onclick="testEdgeFunction()" class="w-full bg-purple-600 text-white p-2 rounded">🚀 Call Edge Function</button>
        </div>
        
        <div id="result" class="mt-4 p-4 rounded-lg hidden"></div>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-blue-600 text-sm">← Back to Main App</a>
        </div>
    </div>

    <script>
        const EDGE_FUNCTION_URL = 'https://njhioapckeupxrcixmdh.supabase.co/functions/v1/sync-google-sheets';
        
        async function testEdgeFunction() {
            const mobile = document.getElementById('mobile-input').value.trim();
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '⏳ Calling Edge Function...';
            resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
            statusDiv.innerHTML = '⏳ Processing...';
            
            if (!mobile || mobile.length !== 10) {
                resultDiv.innerHTML = '❌ Please enter 10-digit mobile number';
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                statusDiv.innerHTML = 'Ready';
                return;
            }
            
            try {
                const startTime = Date.now();
                const response = await fetch(EDGE_FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });
                
                const data = await response.json();
                const duration = Date.now() - startTime;
                
                resultDiv.innerHTML = `
                    <strong>Response (${duration}ms):</strong><br>
                    <pre class="mt-2 p-2 bg-gray-100 rounded text-xs overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
                `;
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 text-green-700';
                
                if (data.exists && data.inActiveUsers) {
                    statusDiv.innerHTML = `✅ User ${mobile} exists in active_users. Ready to login.`;
                    statusDiv.className = 'p-4 rounded-lg mb-4 bg-green-100 text-green-700';
                } else if (data.exists && !data.inActiveUsers) {
                    statusDiv.innerHTML = `📋 Mobile ${mobile} found in platform_stats. Needs to be copied from Google Sheets.`;
                    statusDiv.className = 'p-4 rounded-lg mb-4 bg-yellow-100 text-yellow-700';
                } else {
                    statusDiv.innerHTML = `📱 Mobile ${mobile} is new. Can register.`;
                    statusDiv.className = 'p-4 rounded-lg mb-4 bg-blue-100 text-blue-700';
                }
                
            } catch (err) {
                resultDiv.innerHTML = `❌ Error: ${err.message}<br><br>Make sure the Edge Function is deployed and JWT verification is OFF.`;
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                statusDiv.innerHTML = '❌ Connection failed';
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
            }
        }
    </script>
</body>
</html>
