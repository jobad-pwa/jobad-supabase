<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-600">JobAd</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Telangana Zone Based Jobs</p>
        
        <div id="step1">
            <input type="tel" id="mobile" placeholder="Enter Mobile Number" class="w-full p-3 border rounded-lg mb-3">
            <button onclick="checkMobile()" class="w-full bg-blue-600 text-white p-3 rounded-lg">Check Mobile</button>
        </div>
        
        <div id="step2" style="display:none">
            <input type="password" id="pin" placeholder="Enter PIN" maxlength="4" class="w-full p-3 border rounded-lg mb-3">
            <button onclick="submitPin()" class="w-full bg-green-600 text-white p-3 rounded-lg">Submit</button>
        </div>
        
        <div id="message" class="mt-4 p-3 rounded-lg text-center"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        
        let supabase;
        let currentMobile = '';
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function checkMobile() {
            const mobile = document.getElementById('mobile').value.trim();
            const msgDiv = document.getElementById('message');
            
            if (!mobile || mobile.length !== 10) {
                msgDiv.innerHTML = '❌ Enter 10-digit mobile';
                msgDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
                return;
            }
            
            currentMobile = mobile;
            msgDiv.innerHTML = '⏳ Checking...';
            msgDiv.className = 'mt-4 p-3 rounded-lg bg-blue-100 text-blue-700 text-center';
            
            try {
                // Check Edge Function
                const response = await fetch('https://njhioapckeupxrcixmdh.supabase.co/functions/v1/sync-google-sheets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile: mobile })
                });
                
                const data = await response.json();
                
                if (data.exists && data.inActiveUsers) {
                    msgDiv.innerHTML = '✅ User found! Enter your PIN';
                    msgDiv.className = 'mt-4 p-3 rounded-lg bg-green-100 text-green-700 text-center';
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    msgDiv.innerHTML = '📱 New user. Create a PIN to register.';
                    msgDiv.className = 'mt-4 p-3 rounded-lg bg-blue-100 text-blue-700 text-center';
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                }
            } catch (err) {
                msgDiv.innerHTML = '❌ Error: ' + err.message;
                msgDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
            }
        }
        
        async function submitPin() {
            const pin = document.getElementById('pin').value.trim();
            const msgDiv = document.getElementById('message');
            
            if (!pin || pin.length !== 4) {
                msgDiv.innerHTML = '❌ Enter 4-digit PIN';
                msgDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
                return;
            }
            
            msgDiv.innerHTML = '⏳ Processing...';
            msgDiv.className = 'mt-4 p-3 rounded-lg bg-blue-100 text-blue-700 text-center';
            
            try {
                // Check if user exists
                const { data: existingUser } = await supabase
                    .from('active_users')
                    .select('*')
                    .eq('mobile', currentMobile)
                    .single();
                
                if (existingUser) {
                    // Login
                    if (existingUser.pin_hash === pin) {
                        msgDiv.innerHTML = '✅ Login successful! Redirecting...';
                        msgDiv.className = 'mt-4 p-3 rounded-lg bg-green-100 text-green-700 text-center';
                        setTimeout(() => {
                            alert('Welcome ' + currentMobile);
                        }, 1000);
                    } else {
                        msgDiv.innerHTML = '❌ Wrong PIN. Try again.';
                        msgDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
                        document.getElementById('pin').value = '';
                    }
                } else {
                    // Register new user
                    const newUser = {
                        mobile: currentMobile,
                        pin_hash: pin,
                        created_at: new Date().toISOString()
                    };
                    
                    const { error } = await supabase.from('active_users').insert([newUser]);
                    
                    if (error) {
                        msgDiv.innerHTML = '❌ Registration failed: ' + error.message;
                        msgDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
                    } else {
                        // Add to platform_stats
                        const { data: stats } = await supabase.from('platform_stats').select('mobile_list').single();
                        if (!stats.mobile_list.includes(currentMobile)) {
                            await supabase.from('platform_stats').update({ 
                                mobile_list: [...stats.mobile_list, currentMobile] 
                            });
                        }
                        
                        msgDiv.innerHTML = '✅ Registration successful! Redirecting...';
                        msgDiv.className = 'mt-4 p-3 rounded-lg bg-green-100 text-green-700 text-center';
                        setTimeout(() => {
                            alert('Welcome ' + currentMobile);
                        }, 1000);
                    }
                }
            } catch (err) {
                msgDiv.innerHTML = '❌ Error: ' + err.message;
                msgDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-center';
            }
        }
    </script>
</body>
</html>
