name: Check Files
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check required files
      run: |
        echo "📁 Checking repository files..."
        if [ -f "index.html" ]; then echo "✅ index.html found"; else echo "❌ index.html missing"; exit 1; fi
        if [ -f "test.html" ]; then echo "✅ test.html found"; else echo "❌ test.html missing"; exit 1; fi
        if [ -f "manifest.json" ]; then echo "✅ manifest.json found"; else echo "⚠️ manifest.json missing"; fi
        echo "📊 Repository check complete!"
    - name: List all files
      run: ls -la
