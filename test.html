<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAd - Supabase Connection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen p-6">
        <h1 class="text-2xl font-bold mb-4 text-center">Supabase Connection Test</h1>
        
        <div id="status" class="p-4 rounded-lg mb-4 bg-yellow-100 text-yellow-700">
            ⏳ Testing connection...
        </div>
        
        <div class="space-y-3">
            <input type="tel" id="mobile-input" placeholder="Enter Mobile Number" class="w-full p-2 border rounded">
            <button onclick="testMobile()" class="w-full bg-blue-600 text-white p-2 rounded">Test Mobile</button>
        </div>
        
        <div id="result" class="mt-4 p-4 rounded-lg hidden"></div>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-blue-600 text-sm">← Back to Main App</a>
        </div>
    </div>

    <script>
        // Direct configuration (no external file)
        const SUPABASE_URL = 'https://njhioapckeupxrcixmdh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaGlvYXBja2V1cHhyY2l4bWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTE3OTcsImV4cCI6MjA5NjQ4Nzc5N30.LR9O3xI3kKlU20RORX7d3mu4ktWs6Nw-grSwoOCZhiE';
        
        let supabase;
        
        async function init() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '⏳ Connecting to Supabase...';
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Test connection by getting platform_stats
                const { data, error } = await supabase
                    .from('platform_stats')
                    .select('mobile_list')
                    .single();
                
                if (error) throw error;
                
                const mobileCount = data?.mobile_list?.length || 0;
                statusDiv.innerHTML = `✅ Connected to Supabase!<br>📱 ${mobileCount} mobile numbers in list.`;
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-green-100 text-green-700';
                
            } catch (err) {
                statusDiv.innerHTML = `❌ Connection failed: ${err.message}`;
                statusDiv.className = 'p-4 rounded-lg mb-4 bg-red-100 text-red-700';
                console.error('Connection error:', err);
            }
        }
        
        async function testMobile() {
            const mobile = document.getElementById('mobile-input').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '⏳ Checking...';
            resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
            
            if (!mobile || mobile.length !== 10) {
                resultDiv.innerHTML = '❌ Please enter 10-digit mobile number';
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                return;
            }
            
            try {
                // Query platform_stats
                const { data, error } = await supabase
                    .from('platform_stats')
                    .select('mobile_list')
                    .single();
                
                if (error) throw error;
                
                const mobileList = data?.mobile_list || [];
                const mobileExists = mobileList.includes(mobile);
                
                if (mobileExists) {
                    // Check if user exists in active_users
                    const { data: userData } = await supabase
                        .from('active_users')
                        .select('full_name')
                        .eq('mobile', mobile)
                        .single();
                    
                    resultDiv.innerHTML = `✅ Mobile ${mobile} FOUND in platform_stats!<br>${userData ? `👤 User: ${userData.full_name || 'No name'}` : '⚠️ Not in active_users yet'}`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 text-green-700';
                } else {
                    resultDiv.innerHTML = `📱 Mobile ${mobile} NOT found. You can register as new user.`;
                    resultDiv.className = 'mt-4 p-4 rounded-lg bg-blue-100 text-blue-700';
                }
                
            } catch (err) {
                console.error('Error:', err);
                resultDiv.innerHTML = `❌ Error: ${err.message}`;
                resultDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
            }
        }
        
        // Start when page loads
        init();
    </script>
</body>
</html>
